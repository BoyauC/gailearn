<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣教育AI指引同心圓圖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1623;
    font-family: 'Noto Sans TC', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px 80px;
  }
  .title-block {
    text-align: center;
    margin-bottom: 24px;
  }
  .title-block h1 {
    font-size: 20px;
    font-weight: 700;
    color: #e8edf5;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .title-block p {
    font-size: 12px;
    color: #64748b;
    letter-spacing: 1px;
  }
  .diagram-wrapper {
    width: min(860px, 96vw);
    aspect-ratio: 1;
  }
  svg { width: 100%; height: 100%; overflow: visible; }
  .legend-bar {
    margin-top: 28px;
    display: flex;
    gap: 28px;
    align-items: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    padding: 10px 28px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #94a3b8;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;

</head>
<body>
