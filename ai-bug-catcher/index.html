<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 幻覺抓漏大師｜訓練師模式</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{--g:#76ff72;--r:#ff5f68;--y:#ffe85b;--p:#0b1b10;--w:#f4fff3}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#000;color:var(--w);font-family:"Noto Sans TC",sans-serif}.game{min-height:100vh;padding:28px clamp(16px,6vw,90px);display:flex;flex-direction:column;align-items:center;background:radial-gradient(circle at 50% 0,#174321,#061008 42%,#000 78%)}.game.shake{animation:shake .45s steps(2)}.head{text-align:center}.pixel,button,.hud{font-family:"Press Start 2P",monospace}.eyebrow{color:var(--g);font-size:clamp(.5rem,1.4vw,.7rem)}h1{margin:13px 0 8px;color:var(--y);font:clamp(1.25rem,3.5vw,2.15rem)/1.55 "Press Start 2P","Noto Sans TC";text-shadow:4px 4px #265d2b}.sub{margin:0;color:#b5deb5}.stage{width:min(920px,100%);flex:1;display:grid;align-content:center;gap:18px}.botrow{display:flex;align-items:end;gap:13px}.bot{width:70px;height:62px;border:4px solid var(--g);background:#194b24;box-shadow:5px 5px #020503;display:grid;place-items:center;color:#061007;font:19px "Press Start 2P"}.botname{color:#c7ffc5;font:clamp(.55rem,1.4vw,.7rem)/1.9 "Press Start 2P"}.box,.card{position:relative;border:4px solid var(--g);background:var(--p);box-shadow:7px 7px #020503,inset 0 0 0 3px #1d5228}.box:before{content:"STAGE 1 · FIND THE BUG";position:absolute;top:-14px;left:15px;padding:2px 8px;background:var(--g);color:#061007;font:10px "Press Start 2P"}.box{min-height:220px;padding:clamp(26px,4vw,43px);font-size:clamp(1.1rem,2.7vw,1.55rem);font-weight:700;line-height:2}.word-btn{color:var(--y);border-bottom:3px dashed var(--y);padding:1px 3px;cursor:pointer}.word-btn:hover{background:var(--y);color:#061007}.word-btn.wrong{color:#fff;background:var(--r);border-color:var(--r)}.hint,.toast{text-align:center;font-weight:900;margin:0}.hint{color:#b6d3b5}.toast{min-height:1.5em;color:var(--r)}.hud{width:min(920px,100%);display:flex;justify-content:space-between;color:#c6ffc3;font-size:clamp(.56rem,1.4vw,.76rem);margin-top:25px}.modal{position:fixed;inset:0;z-index:3;display:grid;place-items:center;padding:18px;background:#000c;opacity:0;visibility:hidden;transition:.2s}.modal.show{opacity:1;visibility:visible}.card{width:min(700px,100%);padding:clamp(25px,5vw,45px);transform:scale(.96);transition:.2s}.modal.show .card{transform:scale(1)}h2{margin:0 0 20px;color:var(--y);font:clamp(.9rem,2.5vw,1.3rem)/1.7 "Press Start 2P","Noto Sans TC"}.prob{margin:22px 0}.top{display:flex;justify-content:space-between;font-weight:900}.red{color:var(--r)}.green{color:var(--g)}.track{height:28px;border:3px solid #fff;background:#020503;margin:9px 0}.bar{height:100%;width:0;transition:width 1s}.bar.red{background:var(--r)}.bar.green{background:var(--g)}.reason{margin:0;color:#d7e9d6}.action{width:100%;margin-top:20px;padding:18px 12px;border:0;background:var(--g);color:#061007;box-shadow:5px 5px #204c25;cursor:pointer;font-size:clamp(.62rem,1.7vw,.8rem);line-height:1.6}.action:hover{background:var(--y)}.success{text-align:center;font-size:clamp(1rem,2.4vw,1.2rem);line-height:1.8}@keyframes shake{25%{transform:translateX(-12px)}50%{transform:translateX(12px)}75%{transform:translateX(-6px)}}@media(max-width:500px){.hud{flex-direction:column;gap:12px;text-align:center;align-items:center}}
</style>
</head>
<body>
<main class="game" id="game"><header class="head"><div class="eyebrow pixel">MISSION: DEBUG THE AI BRAIN</div><h1>AI 幻覺抓漏大師</h1><p class="sub">訓練師模式：抓 Bug，重訓 AI！</p></header><section class="stage"><div class="botrow"><div class="bot">AI</div><div class="botname">AI BOT<br>「我很確定！」</div></div><article class="box" id="message">題庫載入中……</article><p class="hint">點擊黃色文字，找出 AI 的幻覺 Bug。</p><p class="toast" id="toast"></p></section><footer class="hud"><span id="level">LEVEL - / -</span><span id="score">TRAINING XP 000</span></footer></main>
<div class="modal" id="brain"><div class="card"><h2>AI 學習資料庫解碼</h2><p>為什麼 AI 會選到錯誤的詞？</p><div class="prob"><div class="top red"><span id="wrongName"></span><span id="wrongPct"></span></div><div class="track"><div class="bar red" id="wrongBar"></div></div><p class="reason" id="wrongReason"></p></div><div class="prob"><div class="top green"><span id="rightName"></span><span id="rightPct"></span></div><div class="track"><div class="bar green" id="rightBar"></div></div><p class="reason" id="rightReason"></p></div><button class="action" id="retrain"></button></div></div>
<div class="modal" id="success"><div class="card"><h2>★ RETRAIN COMPLETE! ★</h2><p class="success" id="feedback"></p><button class="action" id="next"></button></div></div>
<script>
const urls=['questions/level-01.csv','questions/level-02.csv','questions/level-03.csv','questions/level-04.csv','questions/level-05.csv'];const $=id=>document.getElementById(id);let levels=[],current=0,xp=0;
function csv(text){const [head,...rows]=text.replace(/^\uFEFF/,'').trim().split(/\r?\n/).map(x=>x.split(','));return rows.map(row=>Object.fromEntries(head.map((key,i)=>[key,row[i]||''])))}
async function load(){try{levels=(await Promise.all(urls.map(u=>fetch(u,{cache:'no-store'}).then(r=>{if(!r.ok)throw Error();return r.text()})))).flatMap(csv);if(levels.length!==5)throw Error();render()}catch{$('message').textContent='題庫讀取失敗。請確認 questions 資料夾存在，並使用網站伺服器開啟。'}}
function render(){const d=levels[current];$('message').innerHTML=d.stage1_message;$('level').textContent=`LEVEL ${current+1} / ${levels.length}`;$('score').textContent=`TRAINING XP ${String(xp).padStart(3,'0')}`;$('message').querySelectorAll('.word-btn').forEach(b=>b.onclick=()=>b.dataset.isBug==='true'?brain():wrong(b))}
function wrong(b){b.classList.add('wrong');$('game').classList.remove('shake');void $('game').offsetWidth;$('game').classList.add('shake');$('toast').textContent='這不是幻覺，再找找！';setTimeout(()=>$('toast').textContent='',1800)}
function brain(){const d=levels[current];$('wrongName').textContent=`錯誤選詞：${d.wrong_word}`;$('rightName').textContent=`正確選詞：${d.right_word}`;$('wrongPct').textContent=`${d.wrong_prob}%`;$('rightPct').textContent=`${d.right_prob}%`;$('wrongReason').textContent=d.wrong_reason;$('rightReason').textContent=d.right_reason;$('retrain').textContent=d.retrain_btn_text;$('wrongBar').style.width='0';$('rightBar').style.width='0';$('brain').classList.add('show');requestAnimationFrame(()=>requestAnimationFrame(()=>{$('wrongBar').style.width=`${d.wrong_prob}%`;$('rightBar').style.width=`${d.right_prob}%`}))}
$('retrain').onclick=()=>{const d=levels[current];$('retrain').disabled=true;$('retrain').textContent='資料庫注入中……';$('wrongBar').style.width='10%';$('rightBar').style.width='90%';$('wrongPct').textContent='10%';$('rightPct').textContent='90%';setTimeout(()=>{$('brain').classList.remove('show');$('message').textContent=d.final_message;xp+=100;$('score').textContent=`TRAINING XP ${String(xp).padStart(3,'0')}`;$('feedback').textContent=d.success_feedback;$('next').textContent=current===levels.length-1?'重新開始 ▶':'下一關 ▶';$('success').classList.add('show');$('retrain').disabled=false},1500)};
$('next').onclick=()=>{$('success').classList.remove('show');if(current<levels.length-1)current++;else{current=0;xp=0}render()};load();
</script></body></html>
