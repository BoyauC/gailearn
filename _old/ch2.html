<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="referrer" content="no-referrer">
<title>提問魔法師｜第二章・怎麼和 AI 溝通？</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

/* ════════════════════════════════════════
   DESIGN TOKENS  (與第一章保持一致)
════════════════════════════════════════ */
:root {
  --sky:        #e8f4fd;
  --sky-deep:   #c8e6f8;
  --white:      #ffffff;
  --ink:        #1e2d4a;
  --ink-soft:   #4a5f7a;
  --ink-faint:  #8a9bb5;

  --teal:       #00b8d4;
  --teal-light: #80deea;
  --teal-glow:  rgba(0,184,212,0.25);

  --rose:       #e91e8c;
  --rose-light: #f8bbd0;
  --rose-glow:  rgba(233,30,140,0.25);

  --amber:      #ff8f00;
  --amber-light:#ffe0b2;
  --amber-glow: rgba(255,143,0,0.28);

  --violet:     #7c3aed;
  --violet-glow:rgba(124,58,237,0.25);

  --green:      #00c853;
  --green-glow: rgba(0,200,83,0.28);

  --gold:       #ffc107;
  --gold-deep:  #ff8f00;
  --gold-glow:  rgba(255,193,7,0.5);

  --card-shadow: 0 8px 32px rgba(30,45,74,0.12);
  --card-radius: 24px;

  /* star ratings */
  --star-on:  #ffc107;
  --star-off: #d0dce8;
}

/* ════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html { height:100%; overflow:hidden; }
body {
  font-family: 'Noto Sans TC','Nunito',sans-serif;
  background: var(--sky);
  color: var(--ink);
  height: 100%;
  overflow: hidden;
  position: relative;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 15% 10%, rgba(0,184,212,0.13) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 90%, rgba(124,58,237,0.09) 0%, transparent 60%),
    linear-gradient(180deg,#dff0fb 0%,#eef7fe 40%,#f8fbff 100%);
  z-index:0; pointer-events:none;
}

/* ── Bubbles ── */
.bubbles { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.bubble  { position:absolute; bottom:-80px; border-radius:50%; opacity:0;
  animation: rise var(--rise-t) ease-in infinite var(--rise-d); }
@keyframes rise {
  0%  { transform:translateX(0) scale(1);   opacity:.4; bottom:-80px; }
  80% { opacity:.12; }
  100%{ transform:translateX(var(--drift)) scale(.6); opacity:0; bottom:110vh; }
}

/* ════════════════════════════════════════
   APP SHELL
════════════════════════════════════════ */
#app {
  position:relative; z-index:1;
  height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:0 12px;
  max-width:960px; margin:0 auto;
  overflow:hidden;
}

/* ── Top bar ── */
.top-bar {
  width:100%; max-width:960px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
  padding:8px 0 4px;
  animation: slideDown .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-24px);} to{opacity:1;transform:none;} }

.chapter-tag {
  display:inline-flex; align-items:center; gap:6px;
  background:white; border-radius:99px; padding:4px 12px;
  font-size:.72rem; font-weight:700; color:var(--violet);
  box-shadow:0 2px 10px var(--violet-glow); letter-spacing:.04em;
}

.hud-chips { display:flex; gap:10px; }
.chip {
  display:flex; align-items:center; gap:5px;
  background:white; border-radius:99px; padding:4px 12px;
  font-size:.78rem; font-weight:700;
  box-shadow:0 2px 10px rgba(30,45,74,.1); color:var(--ink);
}
.chip-val { color:var(--rose); font-size:1rem; font-weight:900; }

/* ── Page title ── */
.page-title {
  text-align:center; margin-bottom:4px; flex-shrink:0;
  animation:slideDown .6s .1s cubic-bezier(.22,1,.36,1) both;
}
.page-title h1 {
  font-family:'Nunito','Noto Sans TC',sans-serif;
  font-size:clamp(1.2rem,3.5vw,1.9rem); font-weight:900; line-height:1.1;
  color:var(--ink); letter-spacing:-.02em;
}
.page-title h1 em {
  font-style:normal;
  background:linear-gradient(120deg,var(--violet),var(--rose));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.page-title p { margin-top:3px; font-size:.78rem; color:var(--ink-faint); font-weight:500; }

/* ── Progress pills ── */
.progress-row { display:flex; gap:8px; margin-bottom:8px; flex-shrink:0; animation:slideDown .6s .2s cubic-bezier(.22,1,.36,1) both; }
.prog-pill {
  width:50px; height:10px; border-radius:99px;
  background:rgba(30,45,74,.1); transition:background .4s, box-shadow .4s;
}
.prog-pill.done   { background:var(--green);  box-shadow:0 0 8px var(--green-glow); }
.prog-pill.active { background:var(--violet); box-shadow:0 0 8px var(--violet-glow); animation:pillPulse 1.2s ease infinite; }
@keyframes pillPulse {
  0%,100%{ box-shadow:0 0 6px var(--violet-glow); }
  50%    { box-shadow:0 0 16px rgba(124,58,237,.6); }
}

/* ── Screens ── */
.screen {
  width:100%; max-width:920px; display:none; flex-direction:column; align-items:center;
  flex:1; min-height:0; overflow-y:auto; overflow-x:hidden;
  padding-bottom:8px;
}
.screen.active { display:flex; }

/* ════════════════════════════════════════
   SCREEN 0 — CHARACTER SELECT
════════════════════════════════════════ */
.char-intro { font-size:.88rem; font-weight:700; color:var(--ink-soft); margin-bottom:14px; text-align:center; animation:fadeUp .5s .3s both; }
.char-intro strong { color:var(--violet); }

.char-grid {
  display:flex; gap:clamp(8px,2vw,16px); flex-wrap:wrap; justify-content:center;
  margin-bottom:12px;
}
.char-card {
  width:clamp(110px,20vw,140px);
  background:white; border-radius:18px; border:3px solid rgba(124,58,237,.15);
  padding:14px 10px; text-align:center; cursor:pointer;
  box-shadow:var(--card-shadow);
  transition:transform .2s, border-color .2s, box-shadow .2s;
  animation:fadeUp .6s var(--cc-d) cubic-bezier(.22,1,.36,1) both;
}
.char-card:nth-child(1){--cc-d:.2s;}
.char-card:nth-child(2){--cc-d:.3s;}
.char-card:nth-child(3){--cc-d:.4s;}
.char-card:nth-child(4){--cc-d:.5s;}
.char-card:hover { transform:translateY(-6px) scale(1.04); border-color:var(--violet); box-shadow:var(--card-shadow),0 0 20px var(--violet-glow); }
.char-card.selected { border-color:var(--violet); box-shadow:var(--card-shadow),0 0 26px var(--violet-glow); background:linear-gradient(145deg,#f5f0ff,#ede4ff); }
.char-emoji { font-size:2.2rem; margin-bottom:5px; display:block; }
.char-name  { font-size:.88rem; font-weight:900; color:var(--ink); }
.char-trait { font-size:.72rem; color:var(--ink-faint); margin-top:3px; font-weight:500; }

.start-btn {
  margin-top:6px; padding:11px 40px; border-radius:99px;
  background:linear-gradient(135deg,var(--violet),#a855f7);
  color:white; font-family:inherit; font-size:1rem; font-weight:800;
  border:none; cursor:pointer;
  box-shadow:0 4px 22px var(--violet-glow);
  transition:transform .2s, box-shadow .2s, opacity .2s;
  animation:fadeUp .5s .6s both;
  opacity:.5; pointer-events:none;
}
.start-btn.ready { opacity:1; pointer-events:all; }
.start-btn.ready:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 8px 30px rgba(124,58,237,.5); }

/* ════════════════════════════════════════
   SCREEN 1 — SCENE INTRO  (任務卡)
════════════════════════════════════════ */
.scene-intro-card {
  background:white; border-radius:var(--card-radius);
  box-shadow:var(--card-shadow);
  padding:clamp(14px,2.5vw,24px) clamp(16px,3vw,28px);
  max-width:680px; width:100%;
  text-align:center; position:relative; overflow:hidden;
  animation:scaleReveal .55s cubic-bezier(.22,1,.36,1) both;
  border:2px solid rgba(124,58,237,.15);
}
.scene-intro-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg,var(--violet),var(--rose),var(--amber));
}
@keyframes scaleReveal {
  from{opacity:0;transform:scale(.88) translateY(20px);}
  to  {opacity:1;transform:none;}
}
.scene-num-badge {
  display:inline-block; background:linear-gradient(135deg,var(--violet),#a855f7);
  color:white; font-size:.72rem; font-weight:800; letter-spacing:.1em;
  padding:4px 14px; border-radius:99px; margin-bottom:14px;
}
.scene-big-icon { font-size:clamp(2rem,5vw,3rem); margin-bottom:6px; display:block;
  animation:iconBounce .8s cubic-bezier(.22,1,.36,1) .2s both; }
@keyframes iconBounce { from{transform:scale(.4) rotate(-15deg);opacity:0;} to{transform:none;opacity:1;} }

.scene-title { font-size:clamp(1.1rem,3vw,1.35rem); font-weight:900; color:var(--ink); margin-bottom:10px; }
.scene-mission-label { font-size:.72rem; font-weight:700; letter-spacing:.1em; color:var(--violet); margin-bottom:6px; }
.scene-mission-text  { font-size:clamp(.88rem,2.2vw,1rem); line-height:1.7; color:var(--ink-soft); font-weight:500; }

.scene-character-says {
  margin-top:10px; background:linear-gradient(135deg,#f5f0ff,#ede4ff);
  border-radius:14px; padding:10px 14px;
  display:flex; align-items:flex-start; gap:12px; text-align:left;
}
.says-avatar { font-size:2rem; flex-shrink:0; }
.says-bubble { font-size:.85rem; line-height:1.65; color:var(--ink-soft); }
.says-bubble strong { color:var(--violet); font-weight:800; }

.go-btn {
  margin-top:14px; padding:10px 36px; border-radius:99px;
  background:linear-gradient(135deg,var(--violet),#a855f7);
  color:white; font-family:inherit; font-size:.98rem; font-weight:800;
  border:none; cursor:pointer;
  box-shadow:0 4px 20px var(--violet-glow);
  transition:transform .2s, box-shadow .2s;
}
.go-btn:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 8px 28px rgba(124,58,237,.5); }

/* ════════════════════════════════════════
   SCREEN 2 — OPTION SELECTION
════════════════════════════════════════ */
.options-scene-header {
  background:white; border-radius:var(--card-radius);
  box-shadow:var(--card-shadow); border:2px solid rgba(124,58,237,.12);
  padding:clamp(10px,2vw,16px) clamp(12px,2.5vw,20px);
  max-width:800px; width:100%;
  display:flex; align-items:center; gap:12px;
  margin-bottom:12px;
  animation:slideDown .5s cubic-bezier(.22,1,.36,1) both;
  position:relative; overflow:hidden;
}
.options-scene-header::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:5px;
  background:linear-gradient(180deg,var(--violet),#a855f7);
  border-radius:5px 0 0 5px;
}
.osh-icon { font-size:2.4rem; flex-shrink:0; }
.osh-text {}
.osh-label { font-size:.7rem; font-weight:700; letter-spacing:.1em; color:var(--violet); margin-bottom:3px; }
.osh-mission { font-size:clamp(.85rem,2.2vw,.98rem); font-weight:700; color:var(--ink); line-height:1.45; }

.q-label {
  font-size:clamp(.85rem,2.2vw,.98rem); font-weight:700;
  color:var(--ink-soft); margin-bottom:18px; text-align:center;
  animation:fadeUp .4s .1s both;
}
.q-label strong { color:var(--violet); }

/* Option cards */
.options-col {
  display:flex; flex-direction:column; gap:clamp(12px,2vw,18px);
  width:100%; max-width:800px;
}

.opt-card {
  background:white; border-radius:16px;
  border:3px solid rgba(124,58,237,.12);
  box-shadow:0 4px 18px rgba(30,45,74,.09);
  padding:0; overflow:hidden; cursor:pointer;
  transition:transform .2s, border-color .2s, box-shadow .2s;
  animation:fadeUp .5s var(--oc-d) cubic-bezier(.22,1,.36,1) both;
  position:relative;
}
.opt-card:nth-child(1){--oc-d:.1s;}
.opt-card:nth-child(2){--oc-d:.2s;}
.opt-card:nth-child(3){--oc-d:.3s;}

.opt-card:hover:not(.locked) {
  transform:translateY(-3px);
  border-color:var(--violet);
  box-shadow:0 8px 28px var(--violet-glow);
}

.opt-card-inner {
  display:flex; align-items:stretch; gap:0;
}

/* Left accent bar with letter */
.opt-letter {
  width:52px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Nunito',sans-serif; font-size:1.5rem; font-weight:900;
  color:white;
  background:linear-gradient(180deg,var(--violet),#a855f7);
  transition:background .2s;
}
.opt-card:nth-child(2) .opt-letter { background:linear-gradient(180deg,var(--rose),#f06292); }
.opt-card:nth-child(3) .opt-letter { background:linear-gradient(180deg,var(--amber),#ffca28); }

/* Chat bubble area */
.opt-body { flex:1; padding:clamp(9px,1.8vw,14px) clamp(10px,2vw,16px); }

.opt-prompt-label { font-size:.68rem; font-weight:700; letter-spacing:.1em; color:var(--ink-faint); margin-bottom:6px; }

/* Simulated chat prompt bubble */
.opt-bubble {
  background:linear-gradient(135deg,#f0eaff,#e8e0ff);
  border-radius:0 14px 14px 14px;
  padding:8px 12px;
  font-size:clamp(.78rem,1.8vw,.88rem); line-height:1.55;
  color:var(--ink); font-weight:500;
  border-left:3px solid var(--violet);
  position:relative;
}
.opt-card:nth-child(2) .opt-bubble { background:linear-gradient(135deg,#fff0f7,#ffe4f0); border-left-color:var(--rose); }
.opt-card:nth-child(3) .opt-bubble { background:linear-gradient(135deg,#fff8e8,#fff0cc); border-left-color:var(--amber); }

/* Selected state */
.opt-card.selected { transform:none !important; }
.opt-card.selected.opt-A { border-color:var(--violet); box-shadow:0 0 0 3px rgba(124,58,237,.35),var(--card-shadow); }
.opt-card.selected.opt-B { border-color:var(--rose);   box-shadow:0 0 0 3px rgba(233,30,140,.3),var(--card-shadow); }
.opt-card.selected.opt-C { border-color:var(--amber);  box-shadow:0 0 0 3px rgba(255,143,0,.35),var(--card-shadow); }

.opt-card.locked { pointer-events:none; }
.opt-card.dimmed { opacity:.45; }

/* ════════════════════════════════════════
   AI RESPONSE PANEL  (回應展示)
════════════════════════════════════════ */
.ai-response-wrap {
  width:100%; max-width:800px;
  margin-top:10px;
  animation:slideInUp .45s cubic-bezier(.22,1,.36,1) both;
  display:none;
}
.ai-response-wrap.show { display:block; }
@keyframes slideInUp { from{opacity:0;transform:translateY(22px);} to{opacity:1;transform:none;} }

.ai-response-box {
  background:white; border-radius:20px;
  box-shadow:0 6px 24px rgba(30,45,74,.12);
  border:2px solid rgba(0,184,212,.2);
  overflow:hidden;
}
.air-header {
  background:linear-gradient(135deg,rgba(0,184,212,.1),rgba(0,184,212,.04));
  padding:12px 20px; display:flex; align-items:center; gap:10px;
  border-bottom:1px solid rgba(0,184,212,.15);
}
.air-header-icon { font-size:1.4rem; }
.air-header-label { font-size:.78rem; font-weight:800; color:var(--teal); letter-spacing:.05em; }
.air-header-sub   { font-size:.72rem; color:var(--ink-faint); margin-left:auto; }

.air-content { padding:clamp(14px,2.5vw,22px) clamp(16px,3vw,26px); }
.air-text {
  font-size:clamp(.82rem,2vw,.94rem); line-height:1.75; color:var(--ink-soft);
  white-space:pre-wrap;
}
.air-text .highlight { color:var(--teal); font-weight:700; }

/* Typing cursor animation */
.typing-cursor {
  display:inline-block; width:2px; height:1em;
  background:var(--teal); margin-left:2px;
  animation:blink .6s step-end infinite;
  vertical-align:text-bottom;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

/* ════════════════════════════════════════
   SCORE REVEAL  (評分顯示)
════════════════════════════════════════ */
.score-reveal {
  width:100%; max-width:800px;
  margin-top:14px; display:none;
  animation:scaleReveal .5s cubic-bezier(.22,1,.36,1) both;
}
.score-reveal.show { display:block; }

.score-card {
  border-radius:16px; padding:clamp(10px,2vw,16px) clamp(12px,2.5vw,18px);
  display:flex; gap:clamp(14px,3vw,22px); align-items:flex-start;
  border:3px solid transparent;
}
.score-card.best   { background:linear-gradient(135deg,#f0fff4,#e8fff0); border-color:var(--green); box-shadow:0 6px 24px var(--green-glow); }
.score-card.ok     { background:linear-gradient(135deg,#fffdf0,#fff8e0); border-color:var(--gold);  box-shadow:0 6px 24px var(--gold-glow); }
.score-card.poor   { background:linear-gradient(135deg,#fff5f0,#ffe8e0); border-color:#ff7043;      box-shadow:0 6px 24px rgba(255,112,67,.25); }

.score-left { flex-shrink:0; text-align:center; }
.score-medal { font-size:2.4rem; display:block; margin-bottom:4px; }
.score-stars { display:flex; gap:3px; justify-content:center; }
.star { font-size:1.1rem; }

.score-right { flex:1; }
.score-verdict { font-size:clamp(.9rem,2.3vw,1.05rem); font-weight:900; color:var(--ink); margin-bottom:6px; }
.score-explain { font-size:clamp(.8rem,2vw,.9rem); line-height:1.7; color:var(--ink-soft); }
.score-explain strong { color:var(--violet); font-weight:800; }
.score-explain .tip-tag {
  display:inline-block; background:var(--violet); color:white;
  font-size:.65rem; font-weight:800; padding:2px 8px; border-radius:99px;
  margin-right:5px; letter-spacing:.06em; vertical-align:middle;
}

/* Next scene button */
.next-scene-btn {
  margin-top:12px; padding:10px 34px; border-radius:99px;
  background:linear-gradient(135deg,var(--violet),#a855f7);
  color:white; font-family:inherit; font-size:.98rem; font-weight:800;
  border:none; cursor:pointer;
  box-shadow:0 4px 20px var(--violet-glow);
  transition:transform .2s, box-shadow .2s;
  display:none; align-items:center; gap:8px;
  animation:fadeUp .4s both;
}
.next-scene-btn.show { display:inline-flex; }
.next-scene-btn:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 8px 28px rgba(124,58,237,.5); }

/* ════════════════════════════════════════
   FEEDBACK LAYER
════════════════════════════════════════ */
#feedbackLayer {
  position:fixed; inset:0; z-index:200;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
.fb-circle {
  border-radius:50%; width:clamp(120px,28vw,180px); height:clamp(120px,28vw,180px);
  display:flex; align-items:center; justify-content:center; font-size:clamp(2.8rem,8vw,4.2rem);
  animation:fbPop .55s cubic-bezier(.175,.885,.32,1.275) both;
}
.fb-circle.best-hit {
  background:radial-gradient(circle,#fffde7,var(--gold) 55%,#e65100 100%);
  box-shadow:0 0 60px var(--gold-glow), 0 0 120px rgba(255,193,7,.35);
  color:white;
}
.fb-circle.ok-hit {
  background:radial-gradient(circle,#f3e5f5,#ab47bc 55%,#6a1b9a 100%);
  box-shadow:0 0 50px rgba(171,71,188,.5);
  color:white;
}
.fb-circle.poor-hit {
  background:radial-gradient(circle,#ffccbc,#ff7043 55%,#bf360c 100%);
  box-shadow:0 0 50px rgba(255,112,67,.5);
  color:white;
}
@keyframes fbPop {
  0%  {transform:scale(.25) rotate(-15deg);opacity:0;}
  65% {transform:scale(1.12) rotate(5deg); opacity:1;}
  100%{transform:scale(1) rotate(0);       opacity:1;}
}
.fb-circle.fade-out { animation:fbFade .4s ease forwards; }
@keyframes fbFade { to{transform:scale(1.6);opacity:0;} }

/* ════════════════════════════════════════
   CONFETTI
════════════════════════════════════════ */
.confetti-wrap { position:fixed; inset:0; z-index:199; pointer-events:none; overflow:hidden; }
.conf { position:absolute; top:-20px; border-radius:3px;
  animation:confFall var(--cf-t) var(--cf-d) ease-in forwards; }
@keyframes confFall {
  0%  {transform:translateY(0) rotate(0)   translateX(0);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg) translateX(var(--cf-drift));opacity:.2;}
}

/* ════════════════════════════════════════
   END OVERLAY
════════════════════════════════════════ */
#endOverlay {
  position:fixed; inset:0; z-index:300;
  display:none; flex-direction:column; align-items:center; justify-content:flex-end;
  padding-bottom:6vh;
}
.end-blur { position:absolute; inset:0; background:rgba(232,244,253,.7); backdrop-filter:blur(10px); animation:fadeIn .5s both; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

.end-card {
  position:relative; z-index:1; background:white; border-radius:32px;
  padding:clamp(18px,3.5vw,36px) clamp(18px,3.5vw,40px);
  max-width:500px; width:92%; text-align:center;
  box-shadow:0 24px 80px rgba(30,45,74,.22);
  border:2px solid rgba(124,58,237,.2);
  animation:endCardUp .65s .2s cubic-bezier(.22,1,.36,1) both;
}
@keyframes endCardUp { from{opacity:0;transform:translateY(60px);} to{opacity:1;transform:none;} }

.end-trophy { font-size:clamp(3rem,8vw,5rem); display:block; margin-bottom:10px; }
.end-title {
  font-family:'Nunito',sans-serif; font-size:clamp(1.4rem,4vw,2rem); font-weight:900;
  background:linear-gradient(120deg,var(--violet),var(--rose));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:10px;
}
.end-score-big { font-size:clamp(2.2rem,6vw,3.2rem); font-weight:900; color:var(--gold-deep); margin:10px 0; }
.end-score-big span { font-size:.9rem; font-weight:500; color:var(--ink-faint); }

/* Summary table */
.end-summary {
  display:flex; flex-direction:column; gap:5px;
  margin:10px 0 14px; text-align:left;
}
.end-summary-row {
  display:flex; align-items:center; gap:10px;
  background:var(--sky); border-radius:12px; padding:10px 14px;
  font-size:.84rem;
}
.esr-scene { flex:1; font-weight:700; color:var(--ink); }
.esr-choice { font-size:.78rem; color:var(--ink-faint); }
.esr-stars  { display:flex; gap:2px; flex-shrink:0; }

/* Tips card */
.tips-card {
  background:linear-gradient(135deg,#f5f0ff,#ede4ff);
  border-radius:14px; padding:10px 14px; margin-bottom:14px; text-align:left;
}
.tips-title { font-size:.78rem; font-weight:800; letter-spacing:.08em; color:var(--violet); margin-bottom:8px; }
.tip-item { display:flex; gap:8px; align-items:flex-start; font-size:.82rem; line-height:1.55; color:var(--ink-soft); margin-bottom:5px; }
.tip-item:last-child { margin-bottom:0; }
.tip-num { flex-shrink:0; font-weight:900; color:var(--violet); }

.end-msg { font-size:.88rem; line-height:1.7; color:var(--ink-soft); margin-bottom:24px; }

.end-btns { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
.end-btn {
  flex:1; min-width:130px; max-width:170px;
  padding:14px 16px; border-radius:16px; border:none; cursor:pointer;
  font-family:inherit; font-size:.95rem; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:7px;
  transition:transform .2s, box-shadow .2s;
}
.end-btn:hover { transform:translateY(-3px); }
.btn-retry { background:linear-gradient(135deg,var(--violet),#a855f7); color:white; box-shadow:0 5px 20px var(--violet-glow); }
.btn-retry:hover { box-shadow:0 8px 28px rgba(124,58,237,.55); }
.btn-exit  { background:var(--sky-deep,#c8e6f8); color:var(--ink-soft); box-shadow:0 4px 14px rgba(30,45,74,.1); }

/* ════════════════════════════════════════
   FAREWELL
════════════════════════════════════════ */
#farewellScreen {
  display:none; flex-direction:column; align-items:center; justify-content:center;

}
#farewellScreen.show { display:flex; }
#farewellScreen .fw-icon { font-size:5rem; }
#farewellScreen h2 {
  font-family:'Nunito',sans-serif; font-size:clamp(1.6rem,5vw,2.2rem); font-weight:900;

   CREATE TABLE ch2_communication_log (
     id                 INT AUTO_INCREMENT PRIMARY KEY,
     session_id         VARCHAR(36)   NOT NULL COMMENT '每次遊玩唯一識別',
     played_at          DATETIME      NOT NULL COMMENT '作答時間',
     character_chosen   VARCHAR(10)   COMMENT '選擇的角色',
     scene_id           VARCHAR(20)   NOT NULL COMMENT '場景代碼',
     scene_name         VARCHAR(80)   COMMENT '場景名稱',
     chosen_option      CHAR(1)       COMMENT '玩家選的選項 A/B/C',
     chosen_prompt      TEXT          COMMENT '玩家選的提問文字',
     score_earned       TINYINT       COMMENT '本題得分 0/1/3',
     is_best            TINYINT(1)    COMMENT '是否選到最佳選項',
     time_to_answer_sec SMALLINT      COMMENT '顯示選項到作答的秒數',
     read_ai_response   TINYINT(1)    DEFAULT 0 COMMENT '是否展開查看AI回應',
     end_action         VARCHAR(10)   COMMENT 'retry / exit / null',
     total_score        TINYINT       COMMENT '遊戲結束時的總分',
     total_time_sec     SMALLINT      COMMENT '整場遊玩總秒數',
     created_at         TIMESTAMP     DEFAULT CURRENT_TIMESTAMP
   ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4
     COMMENT='第二章溝通技巧情境選擇遊戲紀錄';
   ─────────────────────────────────────────────────────
══════════════════════════════════════════════════════ */
const DB_CONFIG = {
  enabled:  false,
  endpoint: '/api/ch2-communication/log'
};

async function dbLog(row) {
  console.table(row);
  if (!DB_CONFIG.enabled) return;
  try {
    const res = await fetch(DB_CONFIG.endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(row)
    });
    if (!res.ok) console.warn('[DB] log failed:', res.status);
  } catch(e) { console.warn('[DB] error:', e); }
}

/* ══════════════════════════════════════════════════════
   ④  GAME STATE
══════════════════════════════════════════════════════ */
let G = {};
function resetState() {
  G = {
    sessionId:       crypto.randomUUID?.() || Date.now().toString(36),
    character:       null,
    sceneIndex:      0,
    totalScore:      0,
    sceneLogs:       [],          // per-scene summary for end screen
    sceneStartTime:  null,
    gameStartTime:   Date.now(),
    currentScene:    null,
    answered:        false
  };
}

/* ══════════════════════════════════════════════════════
   ⑤  INIT
══════════════════════════════════════════════════════ */
function initGame() {
  resetState();
  buildBubbles();
  buildProgress();
  buildCharGrid();
  showMain();
  showScreen('screenChar');
  updateHUD();
}

function showMain() {
  document.getElementById('app').style.display = 'flex';
  document.getElementById('farewellScreen').classList.remove('show');
  document.getElementById('endOverlay').style.display = 'none';
}

/* Bubbles */
function buildBubbles() {
  const wrap = document.getElementById('bubbles');
  wrap.innerHTML = '';
  const cols = ['rgba(124,58,237,.15)','rgba(233,30,140,.1)','rgba(0,184,212,.13)','rgba(255,193,7,.12)'];
  for (let i=0;i<18;i++) {
    const b = document.createElement('div');
    const sz = 18 + Math.random()*48;
    b.className = 'bubble';
    b.style.cssText = `left:${Math.random()*100}%;width:${sz}px;height:${sz}px;
      background:${cols[i%cols.length]};--rise-t:${8+Math.random()*12}s;
      --rise-d:${Math.random()*10}s;--drift:${(Math.random()-.5)*120}px;`;
    wrap.appendChild(b);
  }
}

/* Progress pills — 3 pills for 3 scenes */
function buildProgress() {
  const row = document.getElementById('progressRow');
  row.innerHTML = '';
  SCENES.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'prog-pill' + (i===0?' active':'');
    d.id = 'pill-'+i;
    row.appendChild(d);
  });
}
function updateProgress() {
  SCENES.forEach((_,i) => {
    const el = document.getElementById('pill-'+i);
    if (!el) return;
    el.className = 'prog-pill';
    if (i < G.sceneIndex)  el.classList.add('done');
    else if (i===G.sceneIndex) el.classList.add('active');
  });
}

/* Character grid */
function buildCharGrid() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  CHARACTERS.forEach(c => {
    const el = document.createElement('div');
    el.className = 'char-card'; el.dataset.id = c.id;
    el.innerHTML = `<span class="char-emoji">${c.emoji}</span>
      <div class="char-name">${c.name}</div>
      <div class="char-trait">${c.trait}</div>`;
    el.addEventListener('click', () => selectChar(el, c));
    el.addEventListener('touchend', e => { e.preventDefault(); selectChar(el, c); }, {passive:false});
    grid.appendChild(el);
  });
}
function selectChar(el, c) {
  document.querySelectorAll('.char-card').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  G.character = c;
  document.getElementById('startBtn').classList.add('ready');
}

/* ══════════════════════════════════════════════════════
   ⑥  GAME FLOW
══════════════════════════════════════════════════════ */
function startGame() {
  if (!G.character) return;
  G.sceneIndex = 0;
  G.totalScore = 0;
  G.sceneLogs  = [];
  G.gameStartTime = Date.now();
  updateProgress();
  loadSceneIntro();
  showScreen('screenIntro');
}

function loadSceneIntro() {
  const sc = SCENES[G.sceneIndex];
  G.currentScene = sc;
  G.answered = false;
  G.sceneStartTime = Date.now();

  const label = `場景 ${G.sceneIndex+1}／${SCENES.length}`;
  document.getElementById('introBadge').textContent  = label;
  document.getElementById('introIcon').textContent   = sc.icon;
  document.getElementById('introTitle').textContent  = sc.title;
  document.getElementById('introMission').textContent= sc.mission;
  document.getElementById('introAvatar').textContent = G.character.emoji;
  document.getElementById('introSpeech').innerHTML   = G.character.name + '說：「' + sc.charSpeech + '」';

  updateHUD();
  // re-trigger animation
  const card = document.getElementById('introCard');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = ''; });
}

function goToOptions() {
  const sc = G.currentScene;
  const label = `場景 ${G.sceneIndex+1}／${SCENES.length}`;

  document.getElementById('optIcon').textContent    = sc.icon;
  document.getElementById('optBadge').textContent   = label;
  document.getElementById('optMission').textContent = sc.mission;

  // Build option cards
  const col = document.getElementById('optionsCol');
  col.innerHTML = '';
  sc.options.forEach((opt,idx) => {
    const card = document.createElement('div');
    card.className = `opt-card opt-${opt.id}`;
    card.dataset.id = opt.id;
    card.innerHTML = `
      <div class="opt-card-inner">
        <div class="opt-letter">${opt.letter}</div>
        <div class="opt-body">
          <div class="opt-prompt-label">💬 提問方式</div>
          <div class="opt-bubble">${escHtml(opt.prompt)}</div>
        </div>
      </div>`;
    card.addEventListener('click', () => handleOptionClick(card, opt));
    card.addEventListener('touchend', e => { e.preventDefault(); handleOptionClick(card, opt); }, {passive:false});
    col.appendChild(card);
  });

  // Reset panels
  document.getElementById('aiResponseWrap').classList.remove('show');
  document.getElementById('scoreReveal').classList.remove('show');
  document.getElementById('scoreReveal').innerHTML = '';
  document.getElementById('nextSceneBtn').classList.remove('show');
  document.getElementById('airText').innerHTML = '';

  showScreen('screenOptions');
  G.sceneStartTime = Date.now(); // restart timer from options screen
}

/* ══════════════════════════════════════════════════════
   ⑦  OPTION CLICK  (核心答題邏輯)
══════════════════════════════════════════════════════ */
function handleOptionClick(card, opt) {
  if (G.answered) return;
  G.answered = true;
  const elapsed = Math.round((Date.now() - G.sceneStartTime) / 1000);
  const sc = G.currentScene;

  // Lock all cards
  document.querySelectorAll('.opt-card').forEach(c => {
    c.classList.add('locked');
    if (c !== card) c.classList.add('dimmed');
  });
  card.classList.add('selected');

  const isBest = (opt.id === sc.bestOption);
  const scoreEarned = opt.score;
  G.totalScore += scoreEarned;

  // Record scene log
  G.sceneLogs.push({
    sceneIndex: G.sceneIndex,
    sceneName:  sc.title,
    chosenId:   opt.id,
    chosenPrompt: opt.prompt,
    score:      scoreEarned,
    isBest,
    elapsed
  });

  // DB log (per answer)
  dbLog({
    session_id:         G.sessionId,
    played_at:          new Date().toISOString(),
    character_chosen:   G.character.name,
    scene_id:           sc.id,
    scene_name:         sc.title,
    chosen_option:      opt.id,
    chosen_prompt:      opt.prompt,
    score_earned:       scoreEarned,
    is_best:            isBest ? 1 : 0,
    time_to_answer_sec: elapsed,
    read_ai_response:   0,           // updated later if user expands
    end_action:         null,
    total_score:        null,
    total_time_sec:     null
  });

  // Visual feedback
  const fbType = scoreEarned === 3 ? 'best-hit' : scoreEarned === 1 ? 'ok-hit' : 'poor-hit';
  showFeedback(fbType);
  if (isBest) { spawnConfetti(); playSound('correct'); }
  else if (scoreEarned === 1) playSound('ok');
  else playSound('wrong');

  updateHUD();

  // Show AI response with typewriter effect
  setTimeout(() => {
    const wrap = document.getElementById('aiResponseWrap');
    wrap.classList.add('show');
    document.getElementById('airHeaderSub').textContent = `選項 ${opt.id} 的模擬回應`;
    typeWrite(document.getElementById('airText'), opt.aiResponse, 18, () => {
      // After typing, show score reveal
      setTimeout(() => showScoreReveal(opt, isBest), 300);
    });
  }, 900);
}

/* ── Typewriter ── */
function typeWrite(el, text, speed, onDone) {
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  el.appendChild(cursor);

  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) {
      cursor.insertAdjacentText('beforebegin', text[i]);
      i++;
    } else {
      clearInterval(interval);
      cursor.remove();
      if (onDone) onDone();
    }
  }, speed);
}

/* ── Score reveal ── */
function showScoreReveal(opt, isBest) {
  const stars = renderStars(opt.score);
  const cls   = opt.score === 3 ? 'best' : opt.score === 1 ? 'ok' : 'poor';
  const medal = opt.score === 3 ? '🏆' : opt.score === 1 ? '⭐' : '💪';

  const html = `
    <div class="score-card ${cls}">
      <div class="score-left">
        <span class="score-medal">${medal}</span>
        <div class="score-stars">${stars}</div>
      </div>
      <div class="score-right">
        <div class="score-verdict">${opt.verdict}</div>
        <div class="score-explain">
          ${opt.explain}<br>
          <span class="tip-tag">提示</span>${opt.tip}
        </div>
      </div>
    </div>`;

  const el = document.getElementById('scoreReveal');
  el.innerHTML = html;
  el.classList.add('show');

  // Show next button
  const isLast = G.sceneIndex >= SCENES.length - 1;
  const nb = document.getElementById('nextSceneBtn');
  document.getElementById('nextSceneTxt').textContent = isLast ? '查看總結 🎉' : '下一個場景 →';
  nb.classList.add('show');
}

function renderStars(score) {
  const filled = score === 3 ? 3 : score === 1 ? 2 : 1;
  let s = '';
  for (let i=0;i<3;i++) s += `<span class="star" style="color:${i<filled?'var(--star-on)':'var(--star-off)'}">★</span>`;
  return s;
}

/* ══════════════════════════════════════════════════════
   ⑧  NEXT SCENE
══════════════════════════════════════════════════════ */
function goNextScene() {
  G.sceneIndex++;
  updateProgress();
  if (G.sceneIndex >= SCENES.length) { showEndScreen(); return; }
  loadSceneIntro();
  showScreen('screenIntro');
}

/* ══════════════════════════════════════════════════════
   ⑨  END SCREEN
══════════════════════════════════════════════════════ */
function showEndScreen() {
  const maxScore = SCENES.length * 3;   // 9
  const pct = G.totalScore / maxScore;
  const totalSec = Math.round((Date.now() - G.gameStartTime) / 1000);

  let trophy, title, msg;
  if (pct === 1)   { trophy='🏆'; title='提問魔法師！'; msg=`哇！全部 ${SCENES.length} 個場景都選到最佳提問！你完全掌握了和 AI 溝通的秘訣，超級厲害！`; }
  else if (pct>=.56){ trophy='⭐'; title='提問小達人！'; msg=`得了 ${G.totalScore} 分，表現很棒！再練習幾次，你一定能在每個場景都找到最佳提問！`; }
  else              { trophy='💪'; title='繼續練習！';   msg=`得了 ${G.totalScore} 分。提問的技巧需要多練習，看看每個場景的「提示」，你會越來越強！`; }

  document.getElementById('endTrophy').textContent           = trophy;
  document.getElementById('endTitle').textContent            = title;
  document.getElementById('endScoreBig').innerHTML           = `${G.totalScore} <span>/ ${maxScore} 分</span>`;
  document.getElementById('endMsg').textContent              = msg;

  // Summary rows
  const sumEl = document.getElementById('endSummary');
  sumEl.innerHTML = G.sceneLogs.map(log => {
    const stars = renderStars(log.score);
    return `<div class="end-summary-row">
      <span class="esr-scene">${SCENES[log.sceneIndex].icon} ${log.sceneName}</span>
      <span class="esr-choice">選了 ${log.chosenId}</span>
      <div class="esr-stars">${stars}</div>
    </div>`;
  }).join('');

  document.getElementById('endOverlay').style.display = 'flex';

  // DB log final record
  dbLog({
    session_id:       G.sessionId,
    played_at:        new Date().toISOString(),
    character_chosen: G.character?.name,
    scene_id:         'END',
    scene_name:       '遊戲結束',
    chosen_option:    null,
    chosen_prompt:    null,
    score_earned:     null,
    is_best:          null,
    time_to_answer_sec: null,
    read_ai_response: null,
    end_action:       null,
    total_score:      G.totalScore,
    total_time_sec:   totalSec
  });
}

document.getElementById('btnRetry').addEventListener('click', () => {
  dbLog({ session_id:G.sessionId, played_at:new Date().toISOString(),
    scene_id:'END', end_action:'retry', total_score:G.totalScore,
    total_time_sec:Math.round((Date.now()-G.gameStartTime)/1000) });
  document.getElementById('endOverlay').style.display = 'none';
  initGame();
});

document.getElementById('btnExit').addEventListener('click', () => {
  dbLog({ session_id:G.sessionId, played_at:new Date().toISOString(),
    scene_id:'END', end_action:'exit', total_score:G.totalScore,
    total_time_sec:Math.round((Date.now()-G.gameStartTime)/1000) });
  document.getElementById('endOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('farewellScreen').classList.add('show');
});

/* ══════════════════════════════════════════════════════
   ⑩  FEEDBACK ANIMATIONS
══════════════════════════════════════════════════════ */
function showFeedback(type) {
  const layer = document.getElementById('feedbackLayer');
  const el = document.createElement('div');
  el.className = `fb-circle ${type}`;
  el.textContent = type==='best-hit'?'✓' : type==='ok-hit'?'△' : '✗';
  layer.appendChild(el);
  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => layer.innerHTML='', 420);
  }, 900);
}

function spawnConfetti() {
  const wrap = document.getElementById('confettiWrap');
  const cols = ['#ffd700','#7c3aed','#e91e8c','#00c853','#00b8d4','#ff8f00'];
  for (let i=0;i<55;i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    const sz = 7+Math.random()*9;
    c.style.cssText = `left:${Math.random()*100}%;width:${sz}px;height:${sz*(.4+Math.random()*.6)}px;
      background:${cols[i%cols.length]};transform:rotate(${Math.random()*360}deg);
      --cf-t:${1.4+Math.random()*.8}s;--cf-d:${Math.random()*.5}s;
      --cf-drift:${(Math.random()-.5)*160}px;`;
    wrap.appendChild(c);
  }
  setTimeout(() => wrap.innerHTML='', 2600);
}

/* ══════════════════════════════════════════════════════
   ⑪  SOUNDS
══════════════════════════════════════════════════════ */
function playSound(type) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    if (type==='correct') {
      [[523.25,0],[659.25,.1],[783.99,.2],[1046.5,.32]].forEach(([f,d]) => {
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+d);
        g.gain.linearRampToValueAtTime(.28,ctx.currentTime+d+.04);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.45);
        o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.5);
      });
    } else if (type==='ok') {
      [[523.25,0],[659.25,.12]].forEach(([f,d]) => {
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0,ctx.currentTime+d);
        g.gain.linearRampToValueAtTime(.2,ctx.currentTime+d+.04);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.4);
        o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.45);
      });
    } else {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sawtooth';
      o.frequency.setValueAtTime(200,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(90,ctx.currentTime+.35);
      g.gain.setValueAtTime(.22,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.38);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+.4);
    }
  } catch(e) {}
}

/* ══════════════════════════════════════════════════════
   ⑫  HELPERS
══════════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id===id));
}
function updateHUD() {
  document.getElementById('scoreVal').textContent  = G.totalScore || 0;
  document.getElementById('sceneCount').textContent= `${(G.sceneIndex||0)+1}/${SCENES.length}`;
}
function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
