<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- ── Google Drive / Google Sites iframe 相容性設定 ── -->
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="referrer" content="no-referrer">
<title>畫圖提示詞建構器｜第三章・AI 小任務</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

/* ═══════════════════════════════════════
   DESIGN TOKENS  (與系列保持一致)
═══════════════════════════════════════ */
:root {
  --sky:         #e8f4fd;
  --sky-deep:    #c8e6f8;
  --white:       #ffffff;
  --ink:         #1e2d4a;
  --ink-soft:    #4a5f7a;
  --ink-faint:   #8a9bb5;

  --teal:        #00b8d4;
  --teal-glow:   rgba(0,184,212,0.25);

  --rose:        #e91e8c;
  --rose-glow:   rgba(233,30,140,0.25);

  --amber:       #ff8f00;
  --amber-glow:  rgba(255,143,0,0.28);

  --violet:      #7c3aed;
  --violet-light:#a855f7;
  --violet-glow: rgba(124,58,237,0.25);

  --green:       #00c853;
  --green-glow:  rgba(0,200,83,0.28);

  --gold:        #ffc107;
  --gold-deep:   #ff8f00;
  --gold-glow:   rgba(255,193,7,0.5);

  --orange:      #ff5722;
  --orange-glow: rgba(255,87,34,0.25);

  --card-shadow: 0 8px 32px rgba(30,45,74,0.12);
  --card-radius: 22px;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

/* ── iframe 完整顯示：鎖定視窗高度，完全禁止捲動 ── */
html {
  height: 100%;
  overflow: hidden;           /* 禁止 html 層捲動 */
}

body {
  font-family:'Noto Sans TC','Nunito',sans-serif;
  background:var(--sky);
  color:var(--ink);
  height: 100%;               /* 撐滿視窗 */
  overflow: hidden;           /* 禁止 body 層捲動 */
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 15%, rgba(255,87,34,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 85%, rgba(124,58,237,0.1) 0%, transparent 60%),
    linear-gradient(180deg,#fdf4e8 0%,#fef9f2 40%,#f8fbff 100%);
  z-index:0; pointer-events:none;
}

/* Floating sparkles */
.sparkles { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.sparkle  {
  position:absolute; font-size:1rem; opacity:0;
  animation:sparkFloat var(--sf-t) ease-in-out infinite var(--sf-d);
}
@keyframes sparkFloat {
  0%   { opacity:0; transform:translateY(0) scale(.5) rotate(0deg); }
  30%  { opacity:.7; }
  70%  { opacity:.4; }
  100% { opacity:0; transform:translateY(-60px) scale(1) rotate(180deg); }
}

/* ═══════════════════════════════════════
   APP SHELL — 固定視窗高度，三段垂直分配
═══════════════════════════════════════ */
#app {
  position: relative; z-index: 1;
  height: 100vh;              /* 鎖定整頁高度 */
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 12px;
  max-width: 1100px;
  margin: 0 auto;
  overflow: hidden;           /* 不讓 #app 自己捲動 */
  gap: 0;
}

/* ── Top bar ── */
.top-bar {
  width:100%; flex-shrink: 0;
  display:flex; align-items:center; justify-content:space-between;
  padding: 8px 0 4px;
  animation:slideDown .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-24px);} to{opacity:1;transform:none;} }

.chapter-tag {
  display:inline-flex; align-items:center; gap:6px;
  background:white; border-radius:99px; padding:4px 12px;
  font-size:.72rem; font-weight:700; color:var(--orange);
  box-shadow:0 2px 10px var(--orange-glow); letter-spacing:.04em;
}
.use-counter {
  display:flex; align-items:center; gap:8px;
  background:white; border-radius:99px; padding:4px 14px;
  font-size:.78rem; font-weight:700; color:var(--ink);
  box-shadow:0 2px 10px rgba(30,45,74,.1);
}
.use-dots { display:flex; gap:5px; }
.use-dot  {
  width:11px; height:11px; border-radius:50%;
  border:2px solid rgba(30,45,74,.2);
  transition:background .3s, border-color .3s, box-shadow .3s;
}
.use-dot.used { background:var(--orange); border-color:var(--orange); box-shadow:0 0 8px var(--orange-glow); }

/* ── Title ── */
.page-title {
  text-align:center; flex-shrink: 0;
  margin-bottom: 6px;
  animation:slideDown .6s .1s cubic-bezier(.22,1,.36,1) both;
}
.page-title h1 {
  font-family:'Nunito','Noto Sans TC',sans-serif;
  font-size:clamp(1.2rem,3.5vw,1.9rem); font-weight:900; line-height:1.1; color:var(--ink);
}
.page-title h1 em {
  font-style:normal;
  background:linear-gradient(120deg,var(--orange),var(--rose));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.page-title p { margin-top:3px; font-size:.78rem; color:var(--ink-faint); font-weight:500; }

/* ═══════════════════════════════════════
   ── TOP SECTION: SELECTORS ──
═══════════════════════════════════════ */
.selectors-panel {
  width:100%; flex-shrink: 0;
  background:white; border-radius:var(--card-radius);
  box-shadow:var(--card-shadow);
  border:2px solid rgba(255,87,34,.15);
  padding: 10px 14px;
  margin-bottom: 8px;
  animation:slideDown .6s .2s cubic-bezier(.22,1,.36,1) both;
  position:relative; overflow:hidden;
}
.selectors-panel::before {
  content:''; position:absolute; top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg,var(--orange),var(--rose),var(--violet),var(--teal));
}

.selectors-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:clamp(10px,2vw,18px);
}
@media(max-width:620px){ .selectors-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:360px){ .selectors-grid { grid-template-columns:1fr; } }

.selector-group { display:flex; flex-direction:column; gap:4px; }

.selector-label {
  font-size:.68rem; font-weight:800; letter-spacing:.08em;
  display:flex; align-items:center; gap:4px;
}
.selector-label.theme   { color:var(--orange); }
.selector-label.style   { color:var(--rose);   }
.selector-label.element { color:var(--violet); }
.selector-label.bg      { color:var(--teal);   }

.selector-label .lbl-icon { font-size:1rem; }

/* Custom select wrapper */
.sel-wrap {
  position:relative;
}
.sel-wrap::after {
  content:'▾';
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  font-size:.9rem; color:var(--ink-faint); pointer-events:none;
}

select {
  width:100%; padding:7px 30px 7px 10px;
  border-radius:12px; border:2px solid rgba(30,45,74,.1);
  background:var(--sky); color:var(--ink);
  font-family:'Noto Sans TC','Nunito',sans-serif;
  font-size:clamp(.75rem,1.8vw,.88rem); font-weight:600;
  appearance:none; -webkit-appearance:none;
  cursor:pointer; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
select:focus { border-color:var(--orange); box-shadow:0 0 0 3px var(--orange-glow); }

select.theme-sel:focus   { border-color:var(--orange); box-shadow:0 0 0 3px var(--orange-glow); }
select.style-sel:focus   { border-color:var(--rose);   box-shadow:0 0 0 3px var(--rose-glow);   }
select.element-sel:focus { border-color:var(--violet); box-shadow:0 0 0 3px var(--violet-glow); }
select.bg-sel:focus      { border-color:var(--teal);   box-shadow:0 0 0 3px var(--teal-glow);   }

/* Selected visual indicator */
select.chosen { border-color:var(--green); background:linear-gradient(135deg,#f0fff4,#e8fff0); }

/* ═══════════════════════════════════════
   ── MIDDLE SECTION: PROMPT + BUTTON ──
═══════════════════════════════════════ */
.middle-panel {
  width:100%; flex-shrink: 0;
  background:white; border-radius:var(--card-radius);
  box-shadow:var(--card-shadow);
  border:2px solid rgba(30,45,74,.08);
  padding: 8px 14px;
  margin-bottom: 8px;
  animation:slideDown .6s .3s cubic-bezier(.22,1,.36,1) both;
  display:flex; align-items:center; gap:clamp(10px,2vw,18px);
  flex-wrap:wrap;
}

.prompt-area { flex:1; min-width:0; }
.prompt-label {
  font-size:.66rem; font-weight:800; letter-spacing:.1em;
  color:var(--orange); margin-bottom:4px;
}
.prompt-text {
  font-size:clamp(.75rem,1.8vw,.88rem); line-height:1.55;
  color:var(--ink-soft); font-style:italic;
  background:linear-gradient(135deg,#fff8f0,#fff3e6);
  border-left:4px solid var(--orange);
  border-radius:0 10px 10px 0;
  padding:7px 12px;
  min-height:38px;
  display:flex; align-items:center;
  transition:all .4s cubic-bezier(.22,1,.36,1);
}
.prompt-text .placeholder { color:var(--ink-faint); font-style:italic; }
.prompt-text .tag {
  display:inline-block; border-radius:6px; padding:1px 7px;
  font-weight:700; font-style:normal; margin:1px 2px;
}
.tag-theme   { background:rgba(255,87,34,.15);   color:var(--orange); }
.tag-style   { background:rgba(233,30,140,.12);  color:var(--rose);   }
.tag-element { background:rgba(124,58,237,.12);  color:var(--violet); }
.tag-bg      { background:rgba(0,184,212,.12);   color:var(--teal);   }

.generate-btn {
  flex-shrink:0;
  padding: 9px 20px;
  border-radius:99px;
  background:linear-gradient(135deg,var(--orange),var(--rose));
  color:white; font-family:inherit;
  font-size:clamp(.8rem,1.8vw,.92rem); font-weight:800;
  border:none; cursor:pointer;
  box-shadow:0 4px 22px var(--orange-glow);
  transition:transform .2s, box-shadow .2s, opacity .2s;
  white-space:nowrap;
  display:flex; align-items:center; gap:6px;
  opacity:.5; pointer-events:none;
}
.generate-btn.ready { opacity:1; pointer-events:all; }
.generate-btn.ready:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 8px 28px rgba(255,87,34,.5); }
.generate-btn.ready:active { transform:scale(.97); }

/* ═══════════════════════════════════════
   ── BOTTOM SECTION: IMAGE GALLERY ──
   flex:1 → 自動填滿剩餘高度
═══════════════════════════════════════ */
.gallery-section {
  width:100%;
  flex: 1;               /* 撐滿剩餘高度 */
  min-height: 0;         /* 允許 flex item 縮小 */
  display: flex;
  flex-direction: column;
  animation:slideDown .6s .4s cubic-bezier(.22,1,.36,1) both;
  padding-bottom: 8px;
}

.gallery-label {
  font-size:.72rem; font-weight:800; letter-spacing:.1em;
  color:var(--ink-faint); margin-bottom:6px; text-align:center;
  flex-shrink: 0;
}

.gallery-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:clamp(6px,1.5vw,14px);
  flex: 1;               /* 撐滿 gallery-section 剩餘空間 */
  min-height: 0;
}
@media(max-width:500px){ .gallery-grid { grid-template-columns:1fr; } }

/* Individual image slot — 完全自適應高度 */
.img-slot {
  background:white; border-radius:var(--card-radius);
  box-shadow:var(--card-shadow);
  border:2px solid rgba(30,45,74,.08);
  overflow:hidden;
  display:flex; flex-direction:column;
  transition:box-shadow .3s, border-color .3s;
  position:relative;
  min-height: 0;         /* 允許在 grid 內縮小 */
}
.img-slot.slot-1 { border-color:rgba(255,87,34,.2); }
.img-slot.slot-2 { border-color:rgba(233,30,140,.2); }
.img-slot.slot-3 { border-color:rgba(124,58,237,.2); }

.img-slot.filled.slot-1 { box-shadow:var(--card-shadow),0 0 20px rgba(255,87,34,.2); }
.img-slot.filled.slot-2 { box-shadow:var(--card-shadow),0 0 20px rgba(233,30,140,.2); }
.img-slot.filled.slot-3 { box-shadow:var(--card-shadow),0 0 20px rgba(124,58,237,.2); }

/* Slot number badge */
.slot-badge {
  position:absolute; top:10px; left:10px; z-index:5;
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.75rem; font-weight:900; color:white;
}
.slot-1 .slot-badge { background:var(--orange); }
.slot-2 .slot-badge { background:var(--rose);   }
.slot-3 .slot-badge { background:var(--violet); }

/* Empty slot placeholder */
.slot-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:8px;
  padding:20px;
}
.slot-empty-icon { font-size:2.5rem; opacity:.3; }
.slot-empty-text { font-size:.78rem; color:var(--ink-faint); text-align:center; line-height:1.5; }

/* Canvas drawing area — 撐滿 slot 剩餘高度 */
.slot-canvas-wrap {
  flex:1; position:relative; overflow:hidden;
  background:#f8fafc;
  min-height: 0;         /* 關鍵：允許縮小到 flex 分配的高度 */
}
.slot-canvas-wrap canvas {
  position:absolute; inset:0; width:100%; height:100%;
}

/* Slot info bar */
.slot-info {
  padding: 6px 10px 8px;
  border-top:1px solid rgba(30,45,74,.06);
  background:white;
  display:none;
  flex-shrink: 0;
}
.slot-info.show { display:block; }

.slot-info-tags {
  display:flex; flex-wrap:wrap; gap:3px; margin-bottom:3px;
}
.slot-info-tag {
  font-size:.6rem; font-weight:700; padding:1px 6px; border-radius:99px;
}
.sit-theme   { background:rgba(255,87,34,.12);  color:var(--orange); }
.sit-style   { background:rgba(233,30,140,.1);  color:var(--rose);   }
.sit-element { background:rgba(124,58,237,.1);  color:var(--violet); }
.sit-bg      { background:rgba(0,184,212,.1);   color:var(--teal);   }

.slot-info-prompt {
  font-size:.62rem; color:var(--ink-faint); line-height:1.4;
  border-top:1px dashed rgba(30,45,74,.08); padding-top:4px; margin-top:3px;
}

/* ═══════════════════════════════════════
   GENERATE ANIMATION OVERLAY
═══════════════════════════════════════ */
.gen-overlay {
  position:absolute; inset:0; z-index:10;
  background:rgba(255,255,255,.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  border-radius:var(--card-radius);
  animation:fadeIn .3s ease both;
}
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

.gen-spinner {
  width:48px; height:48px;
  border:4px solid rgba(255,87,34,.2);
  border-top-color:var(--orange);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg);} }

.gen-text { font-size:.85rem; font-weight:700; color:var(--orange); }

/* ═══════════════════════════════════════
   END OVERLAY
═══════════════════════════════════════ */
#endOverlay {
  position:fixed; inset:0; z-index:300;
  display:none; align-items:center; justify-content:center;
  padding:20px;
}
#endOverlay.show { display:flex; }
.end-blur { position:absolute; inset:0; background:rgba(232,244,253,.75); backdrop-filter:blur(12px); animation:fadeIn .5s both; }

.end-card {
  position:relative; z-index:1; background:white; border-radius:30px;
  padding:clamp(28px,5vw,52px) clamp(24px,5vw,54px);
  max-width:480px; width:100%; text-align:center;
  box-shadow:0 24px 80px rgba(30,45,74,.22);
  border:2px solid rgba(255,87,34,.25);
  animation:endCardUp .65s .2s cubic-bezier(.22,1,.36,1) both;
}
@keyframes endCardUp { from{opacity:0;transform:translateY(50px) scale(.92);} to{opacity:1;transform:none;} }

.end-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg,var(--orange),var(--rose),var(--violet));
  border-radius:28px 28px 0 0;
}
.end-trophy { font-size:clamp(3rem,8vw,5rem); display:block; margin-bottom:10px; }
.end-title  {
  font-family:'Nunito',sans-serif; font-size:clamp(1.4rem,4vw,2rem); font-weight:900;
  background:linear-gradient(120deg,var(--orange),var(--rose));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:8px;
}
.end-msg { font-size:.9rem; line-height:1.7; color:var(--ink-soft); margin-bottom:28px; }

/* Gallery mini preview */
.end-gallery { display:flex; gap:8px; justify-content:center; margin-bottom:22px; }
.end-thumb {
  width:70px; height:70px; border-radius:12px; overflow:hidden;
  border:2px solid rgba(30,45,74,.1); background:#f0f4f8;
}
.end-thumb canvas { width:100%; height:100%; display:block; }

.end-btns { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
.end-btn  {
  flex:1; min-width:130px; max-width:170px;
  padding:14px 16px; border-radius:16px; border:none; cursor:pointer;
  font-family:inherit; font-size:.95rem; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:7px;
  transition:transform .2s, box-shadow .2s;
}
.end-btn:hover { transform:translateY(-3px); }
.btn-retry { background:linear-gradient(135deg,var(--orange),var(--rose)); color:white; box-shadow:0 5px 20px var(--orange-glow); }
.btn-retry:hover { box-shadow:0 8px 28px rgba(255,87,34,.55); }
.btn-exit  { background:var(--sky-deep,#c8e6f8); color:var(--ink-soft); box-shadow:0 4px 14px rgba(30,45,74,.1); }

/* ═══════════════════════════════════════
   CONFETTI
═══════════════════════════════════════ */
.confetti-wrap { position:fixed; inset:0; z-index:199; pointer-events:none; overflow:hidden; }
.conf { position:absolute; top:-20px; border-radius:3px;
  animation:confFall var(--cf-t) var(--cf-d) ease-in forwards; }
@keyframes confFall {
  0%  { transform:translateY(0) rotate(0) translateX(0); opacity:1; }
  100%{ transform:translateY(110vh) rotate(720deg) translateX(var(--cf-drift)); opacity:.2; }
}

/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
@keyframes scaleIn { from{opacity:0;transform:scale(.85);} to{opacity:1;transform:scale(1);} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(18px);} to{opacity:1;transform:none;} }

.slot-appear { animation:scaleIn .5s cubic-bezier(.22,1,.36,1) both; }
</style>
</head>
<body>

<div class="sparkles" id="sparkles"></div>
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- ══════════════════ END OVERLAY ══════════════════ -->
<div id="endOverlay">
  <div class="end-blur"></div>
  <div class="end-card">
    <span class="end-trophy">🎨</span>
    <div class="end-title">你是提示詞魔法師！</div>
    <div class="end-gallery" id="endGallery"></div>
    <div class="end-msg">你已經完成 3 次圖片生成！<br>每一張圖片都是你獨特的提示詞組合出來的，<br>這就是和 AI 一起創作的魔法！✨</div>
    <div class="end-btns">
      <button class="end-btn btn-retry" id="btnRetry">🔄 再玩一次</button>
      <button class="end-btn btn-exit"  id="btnExit">🚪 退出</button>
    </div>
  </div>
</div>

<!-- ══════════════════ MAIN APP ══════════════════ -->
<div id="app">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="chapter-tag">🎨 第三章・AI 小任務</div>
    <div class="use-counter">
      剩餘次數
      <div class="use-dots">
        <div class="use-dot" id="dot0"></div>
        <div class="use-dot" id="dot1"></div>
        <div class="use-dot" id="dot2"></div>
      </div>
    </div>
  </div>

  <!-- Title -->
  <div class="page-title">
    <h1>畫圖<em>提示詞</em>建構器 🖼️</h1>
    <p>選擇主題、風格、元素、背景，組合出你的 AI 繪圖提示詞！</p>
  </div>

  <!-- ── TOP: SELECTORS ── -->
  <div class="selectors-panel">
    <div class="selectors-grid">

      <div class="selector-group">
        <div class="selector-label theme"><span class="lbl-icon">🎯</span>主題</div>
        <div class="sel-wrap">
          <select id="selTheme" class="theme-sel" onchange="onSelectChange()">
            <option value="">── 選擇主題 ──</option>
            <option value="cat">🐱 可愛的貓咪</option>
            <option value="dragon">🐉 神祕的龍</option>
            <option value="robot">🤖 未來機器人</option>
            <option value="mermaid">🧜 海底美人魚</option>
          </select>
        </div>
      </div>

      <div class="selector-group">
        <div class="selector-label style"><span class="lbl-icon">🖌️</span>風格</div>
        <div class="sel-wrap">

<script>
/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
const OPTS = {

  }
};

/* ══════════════════════════════════════════════════
   ②  PROMPT TEXT TEMPLATES

══════════════════════════════════════════════════ */
const PROMPT_TEMPLATES = {
  // theme → style specific intros
  themeStyle: {
    'cat-cartoon':    '一隻活潑可愛的卡通貓咪，擁有大大的眼睛和粉紅色的爪子，',

    'cat-oilpainting':'以厚重油彩技法描繪的高貴貓咪，筆觸豐富充滿質感，',
    'dragon-cartoon': '一條造型誇張的卡通小龍，有可愛的大角和萌萌的表情，',
    'dragon-watercolor':'以水彩渲染的夢幻龍族，鱗片在光影中閃耀如寶石，',
    'dragon-pixel':   '一條8-bit像素風格的龍，充滿復古電玩的神祕感，',
    'dragon-oilpainting':'用油畫技法描繪的威嚴巨龍，色彩濃郁如古典神話壁畫，',
    'robot-cartoon':  '一個外形圓潤可愛的卡通機器人，有閃亮的天線和友善的LED眼睛，',
    'robot-watercolor':'以輕盈水彩描繪的未來機器人，金屬質感中帶有柔和的色彩流動，',

    'robot-oilpainting':'以寫實油畫技法描繪的未來機器人，金屬反光栩栩如生，',
    'mermaid-cartoon':'一位笑容燦爛的卡通美人魚，有彩虹色的魚尾和波浪般的長髮，',
    'mermaid-watercolor':'用水彩暈染描繪的夢幻美人魚，顏色如海浪般自由流動，',
    'mermaid-pixel':  '一位8-bit像素風的美人魚，如同復古海洋遊戲中的傳說角色，',
    'mermaid-oilpainting':'以古典油畫技法描繪的神祕美人魚，如博物館中的珍貴畫作，'
  },
  element: {
    flowers:   '手捧一束盛開的繽紛鮮花，花瓣隨風輕輕飄散，',
    lightning: '掌心揮舞著強大的閃電魔法，電光石火令人屏息，',
    bubbles:   '周圍漂浮著大大小小的彩虹泡泡，如夢似幻，',
    stars:     '身旁閃耀著無數璀璨星星，金光點點如夜空撒落，'
  },
  bg: {
    forest: '置身於光線斑斕的神秘森林，古老大樹環繞，晨霧輕繞其間。',
    space:  '漂浮於壯闊無垠的宇宙星空，星雲彩霞在身後綿延，美麗而深邃。',
    ocean:  '悠游於幽藍深海世界，珊瑚礁與發光魚群點綴四周，神秘瑰麗。',
    city:   '站立在霓虹閃爍的未來城市，五彩光牌倒映於潮濕的街道上。'
  }

function buildPrompt(t, s, e, b) {
  const ts = PROMPT_TEMPLATES.themeStyle[`${t}-${s}`] || '';
  const el = PROMPT_TEMPLATES.element[e] || '';
  const bg = PROMPT_TEMPLATES.bg[b] || '';
  return ts + el + bg;
}

/* ══════════════════════════════════════════════════
   ③  SVG / CANVAS RENDERER
   Generates a unique visual for each of 256 combos
   using deterministic Canvas2D drawing.
══════════════════════════════════════════════════ */

// Seeded RNG for deterministic randomness per combo
function SeededRNG(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function getComboSeed(t, s, e, b) {
  const ti = ['cat','dragon','robot','mermaid'].indexOf(t);
  const si = ['cartoon','watercolor','pixel','oilpainting'].indexOf(s);
  const ei = ['flowers','lightning','bubbles','stars'].indexOf(e);
  const bi = ['forest','space','ocean','city'].indexOf(b);
  return ti * 64 + si * 16 + ei * 4 + bi + 1;
}

function drawImage(canvas, t, s, e, b) {
  const W = canvas.width  = canvas.offsetWidth  || 320;
  const H = canvas.height = canvas.offsetHeight || 240;
  const ctx = canvas.getContext('2d');
  const rng = SeededRNG(getComboSeed(t, s, e, b) * 997 + 13);

  const bgOpts = OPTS.bg[b];
  const themeOpts = OPTS.theme[t];

  /* ── 1. Background gradient ── */
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, bgOpts.skyTop);
  grad.addColorStop(1, bgOpts.skyBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  /* ── 2. Background details (bg-specific) ── */
  drawBgDetails(ctx, b, W, H, rng);

  /* ── 3. Style-specific filter effect (pre-subject) ── */
  drawStylePreEffect(ctx, s, W, H, rng);

  /* ── 4. Main subject ── */
  drawSubject(ctx, t, s, W, H, themeOpts.color, rng);

  /* ── 5. Element overlay ── */
  drawElement(ctx, e, W, H, rng);

  /* ── 6. Style post-effect ── */
  drawStylePostEffect(ctx, s, W, H, rng);

  /* ── 7. Vignette ── */
  const vig = ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.85);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.28)');
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,W,H);
}

/* ── Background detail layers ── */
function drawBgDetails(ctx, b, W, H, rng) {
  if (b === 'space') {
    // Stars
    for (let i=0;i<80;i++) {
      const x = rng()*W, y = rng()*H*.8;
      const r = rng()*.8+.2;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${rng()*.7+.3})`; ctx.fill();
    }
    // Nebula
    const neb = ctx.createRadialGradient(W*.7,H*.2,10,W*.7,H*.2,W*.4);
    neb.addColorStop(0,'rgba(150,80,255,0.25)');
    neb.addColorStop(1,'transparent');
    ctx.fillStyle=neb; ctx.fillRect(0,0,W,H);

  } else if (b === 'forest') {
    // Ground
    ctx.fillStyle='#1b5e20'; ctx.fillRect(0,H*.65,W,H);
    // Trees
    for (let i=0;i<6;i++) {
      const x=rng()*W, trunkH=H*(.25+rng()*.15);
      ctx.fillStyle='#3e2723'; ctx.fillRect(x-4,H*.65-trunkH,8,trunkH);
      ctx.beginPath(); ctx.arc(x,H*.65-trunkH-20,25+rng()*20,0,Math.PI*2);
      ctx.fillStyle=`rgba(${27+Math.floor(rng()*30)},${94+Math.floor(rng()*30)},${32+Math.floor(rng()*20)},0.9)`; ctx.fill();
    }
    // Mist
    const mist=ctx.createLinearGradient(0,H*.55,0,H*.72);
    mist.addColorStop(0,'rgba(200,230,200,0.18)'); mist.addColorStop(1,'transparent');
    ctx.fillStyle=mist; ctx.fillRect(0,H*.55,W,H*.2);

  } else if (b === 'ocean') {
    // Wave layers
    for (let layer=0;layer<3;layer++) {
      const y = H*.45 + layer*12;
      const alpha = .15 + layer*.08;
      ctx.beginPath(); ctx.moveTo(0,y);
      for (let x=0;x<W;x+=20) {
        ctx.lineTo(x, y + Math.sin((x+rng()*50)/30)*8);
      }
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
      ctx.fillStyle=`rgba(0,150,200,${alpha})`; ctx.fill();
    }
    // Bubbles
    for (let i=0;i<12;i++) {
      const x=rng()*W, y=H*.4+rng()*H*.5, r=rng()*6+2;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.strokeStyle='rgba(100,200,255,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
    }
    // Coral
    ctx.fillStyle='rgba(255,100,80,0.4)';
    for (let i=0;i<5;i++) {
      const cx=rng()*W, base=H*.88;
      for (let j=0;j<3;j++) {
        ctx.beginPath(); ctx.moveTo(cx+j*8-8,base);
        ctx.lineTo(cx+j*8-8, base-20-rng()*15);
        ctx.lineWidth=4; ctx.strokeStyle=`rgba(255,${100+Math.floor(rng()*80)},80,0.5)`;
        ctx.stroke();
      }
    }

  } else if (b === 'city') {
    // Buildings
    const neonCols=['#ff00ff','#00ffff','#ff6600','#00ff88','#ff0066'];
    for (let i=0;i<8;i++) {
      const bw=30+rng()*40, bh=H*(.3+rng()*.5);
      const bx=i*(W/7)-10;
      ctx.fillStyle=`rgb(${10+Math.floor(rng()*20)},${0+Math.floor(rng()*10)},${20+Math.floor(rng()*20)})`;
      ctx.fillRect(bx, H-bh, bw, bh);
      // Windows
      const col=neonCols[Math.floor(rng()*neonCols.length)];
      for (let wy=H-bh+8;wy<H-8;wy+=12) {
        for (let wx=bx+5;wx<bx+bw-5;wx+=10) {
          if (rng()>.35) {
            ctx.fillStyle=`rgba(${hexToRgb(col)},${.4+rng()*.4})`; 
            ctx.fillRect(wx,wy,5,5);
          }
        }
      }
      // Neon sign
      ctx.strokeStyle=col; ctx.lineWidth=1.5;
      ctx.strokeRect(bx+2,H-bh-2,bw-4,3);
    }
    // Reflection puddles
    const refl=ctx.createLinearGradient(0,H*.85,0,H);
    refl.addColorStop(0,'rgba(80,0,120,0.3)'); refl.addColorStop(1,'rgba(120,0,80,0.1)');
    ctx.fillStyle=refl; ctx.fillRect(0,H*.85,W,H);
  }
}

/* ── Style pre-effects ── */
function drawStylePreEffect(ctx, s, W, H, rng) {
  if (s === 'watercolor') {
    /* ★ WATERCOLOR：先鋪一層白色半透明紙質底 + 淡彩暈染斑塊 */
    ctx.fillStyle = 'rgba(255,252,245,0.55)';
    ctx.fillRect(0,0,W,H);
    // 大面積淡彩暈染（多層色塊疊加，模擬水彩下色）
    const wcPalette=['rgba(255,200,180,0.18)','rgba(180,220,255,0.18)',
                     'rgba(200,255,210,0.15)','rgba(255,230,180,0.18)'];
    for(let i=0;i<6;i++){
      const x=rng()*W*1.2-W*.1, y=rng()*H*1.2-H*.1, r=W*(.35+rng()*.3);
      const g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,wcPalette[i%wcPalette.length]);
      g.addColorStop(0.6,'rgba(255,255,255,0.06)');
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    }
  } else if (s === 'pixel') {
    /* ★ PIXEL：先把整個背景像素化（大格子化） */
    const PS=8; // 像素大小
    // 把現有背景圖案取樣後重畫成大像素塊
    const tempCanvas=document.createElement('canvas');
    tempCanvas.width=Math.ceil(W/PS); tempCanvas.height=Math.ceil(H/PS);
    const tCtx=tempCanvas.getContext('2d');
    tCtx.drawImage(ctx.canvas,0,0,Math.ceil(W/PS),Math.ceil(H/PS));
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(tempCanvas,0,0,W,H);
    // 疊加黑色網格線
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=0.5;
    for(let x=0;x<=W;x+=PS){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=0;y<=H;y+=PS){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  } else if (s === 'oilpainting') {
    /* ★ OIL PAINTING：深色底 + 暗部厚塗效果 */
    const darkOverlay=ctx.createLinearGradient(0,0,0,H);
    darkOverlay.addColorStop(0,'rgba(20,10,5,0.35)');
    darkOverlay.addColorStop(0.5,'rgba(10,5,0,0.2)');
    darkOverlay.addColorStop(1,'rgba(30,15,5,0.45)');
    ctx.fillStyle=darkOverlay; ctx.fillRect(0,0,W,H);
    // 帆布紋路（細橫條）
    for(let y=0;y<H;y+=3){
      ctx.fillStyle=`rgba(0,0,0,${0.04+rng()*0.03})`;
      ctx.fillRect(0,y,W,1);
    }
    // 帆布紋路（細直條）
    for(let x=0;x<W;x+=4){
      ctx.fillStyle=`rgba(0,0,0,${0.02+rng()*0.02})`;
      ctx.fillRect(x,0,1,H);
    }
  }
  // cartoon：不加 pre-effect，直接用鮮豔背景
}

/* ── Main subject drawing ── */
function drawSubject(ctx, t, s, W, H, color, rng) {
  const cx = W/2, cy = H*.52;
  const scale = Math.min(W,H)/320;

  /* ★★★ 四種風格各有完全不同的渲染路徑 ★★★ */

  if (s === 'pixel') {
    // 像素風：關閉平滑化，主角用大像素方塊繪製
    drawPixelSubject(ctx, t, cx, cy, scale, color, rng);
    return;
  }

  if (s === 'cartoon') {
    // 卡通風：純色填滿 + 粗黑外框 + 無漸層陰影
    ctx.save();
    ctx.shadowColor='transparent'; ctx.shadowBlur=0;
    drawSubjectCartoon(ctx, t, cx, cy, scale, color, rng);
    ctx.restore();
    return;
  }

  if (s === 'watercolor') {
    // 水彩風：低透明度多層疊色 + 模糊邊緣 + 無外框
    ctx.save();
    ctx.globalAlpha = 0.78;
    drawSubjectWatercolor(ctx, t, cx, cy, scale, color, rng);
    ctx.restore();
    return;
  }

  if (s === 'oilpainting') {
    // 油畫風：深色飽和 + 厚塗光影 + 強烈明暗對比
    drawSubjectOilPainting(ctx, t, cx, cy, scale, color, rng);
    return;
  }
}

/* ── CARTOON style: thick black outline + flat color, no gradients ── */
function drawSubjectCartoon(ctx, t, cx, cy, sc, color, rng) {
  ctx.lineJoin='round'; ctx.lineCap='round';
  // Bright solid body glow (cartoon-style aura)
  ctx.beginPath(); ctx.arc(cx, cy-10*sc, 55*sc, 0, Math.PI*2);
  ctx.fillStyle=hexAlpha(color, .12); ctx.fill();
  if (t==='cat')     drawCat(ctx, cx, cy, sc, color, 'cartoon', rng);
  if (t==='dragon')  drawDragon(ctx, cx, cy, sc, color, 'cartoon', rng);
  if (t==='robot')   drawRobot(ctx, cx, cy, sc, color, 'cartoon', rng);
  if (t==='mermaid') drawMermaid(ctx, cx, cy, sc, color, 'cartoon', rng);
  // Heavy black outline pass (draw again in stroke mode)
  applyCartoonOutline(ctx, t, cx, cy, sc, color, rng);
}

/* Cartoon outline: a second pass with thick stroke over the subject */
function applyCartoonOutline(ctx, t, cx, cy, sc, col, rng) {
  ctx.save(); ctx.translate(cx, cy);
  ctx.strokeStyle='#111'; ctx.lineWidth=3.5*sc; ctx.lineJoin='round'; ctx.lineCap='round';
  // Body outline ellipse
  if(t==='cat'||t==='robot'){
    roundRect(ctx,-30*sc,-20*sc,60*sc,55*sc,22*sc); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,-40*sc,32*sc,0,Math.PI*2); ctx.stroke();
  } else if(t==='dragon'){
    ctx.beginPath(); ctx.ellipse(0,15*sc,28*sc,40*sc,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0,-38*sc,24*sc,20*sc,0,0,Math.PI*2); ctx.stroke();
  } else if(t==='mermaid'){
    ctx.beginPath(); ctx.ellipse(0,-15*sc,20*sc,28*sc,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0,25*sc,20*sc,45*sc,.05,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

/* ── WATERCOLOR style: multi-layer translucent blobs, soft edges ── */
function drawSubjectWatercolor(ctx, t, cx, cy, sc, color, rng) {
  const c = hexToRgbArr(color);
  // Paint multiple soft translucent layers to simulate watercolor
  for(let layer=0; layer<4; layer++){
    const offsetX=(rng()-.5)*8*sc;
    const offsetY=(rng()-.5)*6*sc;
    const alpha=0.18+layer*0.08;
    ctx.save();
    ctx.translate(cx+offsetX, cy+offsetY);
    ctx.globalAlpha=alpha;
    // Draw simplified silhouette for each layer
    drawWCSilhouette(ctx, t, sc, color, rng);
    ctx.restore();
  }
  // Final layer slightly more opaque for definition
  ctx.save();
  ctx.translate(cx, cy);
  ctx.globalAlpha=0.55;
  drawWCSilhouette(ctx, t, sc, color, rng);
  ctx.restore();
  // Watercolor bleed effect: soft halo around subject
  const halo=ctx.createRadialGradient(cx,cy-10*sc,20*sc,cx,cy-10*sc,70*sc);
  halo.addColorStop(0,`rgba(${c},0.1)`);
  halo.addColorStop(0.5,`rgba(${c},0.04)`);
  halo.addColorStop(1,'transparent');
  ctx.fillStyle=halo; ctx.fillRect(0,0,ctx.canvas.width,ctx.canvas.height);
}

function drawWCSilhouette(ctx, t, sc, color, rng) {
  const c=hexToRgbArr(color);
  // Simplified blob silhouette per theme (no outlines, just translucent fills)
  ctx.fillStyle=`rgb(${c})`;
  if(t==='cat'){
    ctx.beginPath(); ctx.ellipse(0,5*sc,34*sc,48*sc,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-45*sc,28*sc,26*sc,0,0,Math.PI*2); ctx.fill();
  } else if(t==='dragon'){
    ctx.beginPath(); ctx.ellipse(0,10*sc,32*sc,50*sc,.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-40*sc,26*sc,22*sc,0,0,Math.PI*2); ctx.fill();
    // Wings as blobs
    ctx.beginPath(); ctx.ellipse(-52*sc,-20*sc,30*sc,18*sc,-.4,0,Math.PI*2);
    ctx.fillStyle=hexAlpha(color,0.6); ctx.fill();
    ctx.beginPath(); ctx.ellipse(52*sc,-20*sc,30*sc,18*sc,.4,0,Math.PI*2); ctx.fill();
  } else if(t==='robot'){
    ctx.fillRect(-32*sc,-22*sc,64*sc,72*sc);
    ctx.beginPath(); ctx.ellipse(0,-55*sc,30*sc,24*sc,0,0,Math.PI*2); ctx.fill();
  } else if(t==='mermaid'){
    ctx.beginPath(); ctx.ellipse(0,-10*sc,22*sc,32*sc,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,30*sc,18*sc,48*sc,.05,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-52*sc,22*sc,20*sc,0,0,Math.PI*2); ctx.fill();
  }
  // White bloom highlight
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.ellipse(-8*sc,-30*sc,14*sc,20*sc,-.3,0,Math.PI*2); ctx.fill();
}

/* ── OIL PAINTING style: dark saturated tones + dramatic lighting ── */
function drawSubjectOilPainting(ctx, t, cx, cy, sc, color, rng) {
  const c=hexToRgbArr(color);
  // Dark dramatic underpainting: deep shadow version
  ctx.save();
  ctx.translate(cx+4*sc, cy+6*sc);
  ctx.globalAlpha=0.45;
  ctx.fillStyle='#1a0a00';
  drawOilSilhouette(ctx, t, sc);
  ctx.restore();

  // Main subject with rich, dark-saturated color
  ctx.save();
  ctx.translate(cx, cy);
  ctx.globalAlpha=1;
  drawOilSubject(ctx, t, sc, color, rng);
  ctx.restore();

  // Bright impasto highlight (thick white paint strokes on lit side)
  ctx.save();
  ctx.translate(cx-10*sc, cy-20*sc);
  ctx.globalAlpha=0.22;
  ctx.fillStyle='#fffbe8';
  drawOilSilhouette(ctx, t, sc*0.6);
  ctx.restore();
}

function drawOilSilhouette(ctx, t, sc){
  if(t==='cat'){
    ctx.beginPath(); ctx.ellipse(0,5*sc,34*sc,48*sc,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-45*sc,28*sc,26*sc,0,0,Math.PI*2); ctx.fill();
  } else if(t==='dragon'){
    ctx.beginPath(); ctx.ellipse(0,10*sc,32*sc,50*sc,.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-52*sc,-20*sc,28*sc,16*sc,-.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(52*sc,-20*sc,28*sc,16*sc,.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-38*sc,24*sc,20*sc,0,0,Math.PI*2); ctx.fill();
  } else if(t==='robot'){
    ctx.fillRect(-32*sc,-22*sc,64*sc,72*sc);
    ctx.fillRect(-30*sc,-74*sc,60*sc,50*sc);
  } else if(t==='mermaid'){
    ctx.beginPath(); ctx.ellipse(0,25*sc,18*sc,48*sc,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-15*sc,20*sc,30*sc,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-50*sc,22*sc,20*sc,0,0,Math.PI*2); ctx.fill();
  }
}

function drawOilSubject(ctx, t, sc, color, rng){
  const c=hexToRgbArr(color);
  // Rich saturated fill with strong light-shadow gradient
  const ltGrad=ctx.createLinearGradient(-60*sc,-80*sc,40*sc,80*sc);
  // Lit side: boosted brightness, shadow side: deep dark
  ltGrad.addColorStop(0,`rgba(255,255,220,0.35)`);
  ltGrad.addColorStop(0.35,`rgba(${c},1)`);
  ltGrad.addColorStop(0.7,hexAlpha(color,0.85));
  ltGrad.addColorStop(1,'rgba(10,5,0,0.6)');

  // Draw main forms with gradient
  ctx.fillStyle=ltGrad;
  drawOilSilhouette(ctx, t, sc);

  // Secondary deep shadow overlay
  const shadowGrad=ctx.createLinearGradient(30*sc,-20*sc,60*sc,70*sc);
  shadowGrad.addColorStop(0,'transparent');
  shadowGrad.addColorStop(1,'rgba(0,0,0,0.42)');
  ctx.fillStyle=shadowGrad;
  drawOilSilhouette(ctx, t, sc);

  // Impasto highlight strokes (thick paint marks)
  ctx.strokeStyle='rgba(255,255,200,0.55)';
  ctx.lineCap='round';
  for(let i=0;i<8;i++){
    const hx=(rng()-.5)*50*sc, hy=-60*sc+rng()*60*sc;
    const len=(10+rng()*25)*sc;
    const angle=-0.4+rng()*0.5;
    ctx.lineWidth=(2+rng()*3)*sc;
    ctx.beginPath();
    ctx.moveTo(hx,hy);
    ctx.lineTo(hx+Math.cos(angle)*len, hy+Math.sin(angle)*len);
    ctx.stroke();
  }
}

/* ── Cat ── */
function drawCat(ctx, cx, cy, sc, col, style, rng) {
  const c = hexToRgbArr(col);
  // Body
  ctx.save();
  ctx.translate(cx, cy);
  if (style==='watercolor') { ctx.globalAlpha=.85; }

  // Tail
  ctx.beginPath();
  ctx.moveTo(30*sc,20*sc); ctx.quadraticCurveTo(70*sc,-10*sc,60*sc,-50*sc);
  ctx.lineWidth=10*sc; ctx.strokeStyle=`rgb(${c})`; ctx.lineCap='round'; ctx.stroke();

  // Body oval
  roundRect(ctx, -30*sc, -20*sc, 60*sc, 55*sc, 22*sc);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();
  if (style==='oilpainting') {
    ctx.strokeStyle=`rgba(${c},.5)`; ctx.lineWidth=3*sc; ctx.stroke();
  }

  // Belly
  roundRect(ctx, -15*sc, 0*sc, 30*sc, 28*sc, 12*sc);
  ctx.fillStyle=`rgba(255,255,255,.3)`; ctx.fill();

  // Head
  ctx.beginPath(); ctx.arc(0,-40*sc, 32*sc, 0, Math.PI*2);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();

  // Ears
  ctx.beginPath();
  ctx.moveTo(-28*sc,-60*sc); ctx.lineTo(-18*sc,-85*sc); ctx.lineTo(-5*sc,-60*sc);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(5*sc,-60*sc); ctx.lineTo(18*sc,-85*sc); ctx.lineTo(28*sc,-60*sc);
  ctx.fill();

  // Inner ears
  ctx.beginPath();
  ctx.moveTo(-24*sc,-65*sc); ctx.lineTo(-17*sc,-80*sc); ctx.lineTo(-9*sc,-65*sc);
  ctx.fillStyle='rgba(255,180,200,.6)'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(9*sc,-65*sc); ctx.lineTo(17*sc,-80*sc); ctx.lineTo(24*sc,-65*sc); ctx.fill();

  // Eyes
  ctx.beginPath(); ctx.ellipse(-12*sc,-42*sc,7*sc,9*sc,0,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(12*sc,-42*sc,7*sc,9*sc,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-12*sc,-42*sc,4*sc,5*sc,0,0,Math.PI*2);
  ctx.fillStyle='#222'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(12*sc,-42*sc,4*sc,5*sc,0,0,Math.PI*2); ctx.fill();
  // Shine
  ctx.beginPath(); ctx.arc(-10*sc,-44*sc,1.5*sc,0,Math.PI*2);
  ctx.fillStyle='white'; ctx.fill();
  ctx.beginPath(); ctx.arc(14*sc,-44*sc,1.5*sc,0,Math.PI*2); ctx.fill();

  // Nose & mouth
  ctx.beginPath(); ctx.arc(0,-36*sc,3*sc,0,Math.PI*2);
  ctx.fillStyle='#ff8a80'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,-33*sc); ctx.lineTo(-5*sc,-28*sc);
  ctx.moveTo(0,-33*sc); ctx.lineTo(5*sc,-28*sc);
  ctx.strokeStyle='#ff8a80'; ctx.lineWidth=1.5*sc; ctx.stroke();

  // Whiskers
  ctx.lineWidth=.8*sc; ctx.strokeStyle=`rgba(255,255,255,.6)`;
  [[-8,-36,-28,-34],[-8,-36,-28,-38],[8,-36,28,-34],[8,-36,28,-38]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1*sc,y1*sc); ctx.lineTo(x2*sc,y2*sc); ctx.stroke();
  });

  ctx.restore();
}

/* ── Dragon ── */
function drawDragon(ctx, cx, cy, sc, col, style, rng) {
  const c = hexToRgbArr(col);
  ctx.save(); ctx.translate(cx, cy);

  // Wing left
  ctx.beginPath();
  ctx.moveTo(-20*sc,-20*sc); ctx.lineTo(-80*sc,-60*sc); ctx.lineTo(-70*sc,-10*sc);
  ctx.lineTo(-55*sc,10*sc); ctx.closePath();
  ctx.fillStyle=hexAlpha(col,.7); ctx.fill();
  if(style==='oilpainting'){ ctx.strokeStyle=hexAlpha(col,.4); ctx.lineWidth=2*sc; ctx.stroke(); }

  // Wing right
  ctx.beginPath();
  ctx.moveTo(20*sc,-20*sc); ctx.lineTo(80*sc,-60*sc); ctx.lineTo(70*sc,-10*sc);
  ctx.lineTo(55*sc,10*sc); ctx.closePath();
  ctx.fillStyle=hexAlpha(col,.7); ctx.fill();

  // Body
  ctx.beginPath(); ctx.ellipse(0,15*sc,28*sc,40*sc,0,0,Math.PI*2);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();

  // Belly scales
  for (let i=0;i<4;i++) {
    ctx.beginPath(); ctx.ellipse(0,(i*12-8)*sc,12*sc,6*sc,0,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,200,.3)`; ctx.fill();
  }

  // Head
  ctx.beginPath(); ctx.ellipse(0,-38*sc,24*sc,20*sc,-.1,0,Math.PI*2);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();

  // Horns
  ctx.beginPath(); ctx.moveTo(-12*sc,-52*sc); ctx.lineTo(-16*sc,-80*sc); ctx.lineTo(-6*sc,-54*sc);
  ctx.fillStyle=`rgba(${c},.8)`; ctx.fill();
  ctx.beginPath(); ctx.moveTo(12*sc,-52*sc); ctx.lineTo(16*sc,-80*sc); ctx.lineTo(6*sc,-54*sc); ctx.fill();

  // Eyes glow
  [[-10,-40],[10,-40]].forEach(([ex,ey])=>{
    const eg=ctx.createRadialGradient(ex*sc,ey*sc,0,ex*sc,ey*sc,8*sc);
    eg.addColorStop(0,'#fff700'); eg.addColorStop(1,'rgba(255,200,0,0)');
    ctx.fillStyle=eg; ctx.fillRect((ex-8)*sc,(ey-8)*sc,16*sc,16*sc);
    ctx.beginPath(); ctx.ellipse(ex*sc,ey*sc,5*sc,7*sc,0,0,Math.PI*2);
    ctx.fillStyle='#222'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(ex*sc,ey*sc,2*sc,3*sc,.3,0,Math.PI*2);
    ctx.fillStyle='#ff0'; ctx.fill();
  });

  // Mouth / fire
  ctx.beginPath(); ctx.moveTo(-10*sc,-24*sc); ctx.lineTo(10*sc,-24*sc);
  ctx.strokeStyle='#ff6600'; ctx.lineWidth=2.5*sc; ctx.lineCap='round'; ctx.stroke();
  // Flame
  ctx.beginPath();
  ctx.moveTo(8*sc,-22*sc); ctx.bezierCurveTo(20*sc,-10*sc,28*sc,0*sc,20*sc,10*sc);
  ctx.bezierCurveTo(14*sc,2*sc,10*sc,-2*sc,8*sc,-22*sc);
  ctx.fillStyle='rgba(255,120,0,.7)'; ctx.fill();

  // Tail
  ctx.beginPath(); ctx.moveTo(10*sc,50*sc);
  ctx.quadraticCurveTo(50*sc,60*sc,60*sc,30*sc);
  ctx.lineWidth=8*sc; ctx.strokeStyle=`rgb(${c})`; ctx.lineCap='round'; ctx.stroke();

  ctx.restore();
}

/* ── Robot ── */
function drawRobot(ctx, cx, cy, sc, col, style, rng) {
  const c = hexToRgbArr(col);
  ctx.save(); ctx.translate(cx, cy);

  // Antenna
  ctx.beginPath(); ctx.moveTo(0,-75*sc); ctx.lineTo(0,-90*sc);
  ctx.strokeStyle=`rgb(${c})`; ctx.lineWidth=3*sc; ctx.stroke();
  ctx.beginPath(); ctx.arc(0,-93*sc,5*sc,0,Math.PI*2);
  ctx.fillStyle='#ff5252'; ctx.fill();
  // Glow on antenna ball
  const ag=ctx.createRadialGradient(0,-93*sc,0,0,-93*sc,10*sc);
  ag.addColorStop(0,'rgba(255,80,80,.5)'); ag.addColorStop(1,'transparent');
  ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(0,-93*sc,10*sc,0,Math.PI*2); ctx.fill();

  // Arms
  ctx.fillStyle=`rgba(${c},.8)`;
  roundRect(ctx,-52*sc,-22*sc,14*sc,38*sc,6*sc); ctx.fill();
  roundRect(ctx, 38*sc,-22*sc,14*sc,38*sc,6*sc); ctx.fill();
  // Hands
  ctx.beginPath(); ctx.arc(-45*sc,18*sc,9*sc,0,Math.PI*2);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();
  ctx.beginPath(); ctx.arc(45*sc,18*sc,9*sc,0,Math.PI*2); ctx.fill();

  // Body
  roundRect(ctx,-34*sc,-20*sc,68*sc,70*sc,14*sc);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();
  if(style==='oilpainting'){
    ctx.strokeStyle=`rgba(255,255,255,.2)`; ctx.lineWidth=2*sc; ctx.stroke();
  }

  // Chest panel
  roundRect(ctx,-22*sc,-8*sc,44*sc,36*sc,8*sc);
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fill();
  // LED lights
  const leds=['#ff5252','#69ff47','#40c4ff'];
  leds.forEach((lc,i)=>{
    ctx.beginPath(); ctx.arc((-14+i*14)*sc,4*sc,4*sc,0,Math.PI*2);
    ctx.fillStyle=lc; ctx.fill();
    const lg=ctx.createRadialGradient((-14+i*14)*sc,4*sc,0,(-14+i*14)*sc,4*sc,8*sc);
    lg.addColorStop(0,lc+'88'); lg.addColorStop(1,'transparent');
    ctx.fillStyle=lg; ctx.fillRect((-22+i*14)*sc,-4*sc,16*sc,16*sc);
  });
  // Speaker lines
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.moveTo(-16*sc,(18+i*5)*sc); ctx.lineTo(16*sc,(18+i*5)*sc);
    ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1.5*sc; ctx.stroke();
  }

  // Legs
  roundRect(ctx,-24*sc,52*sc,18*sc,30*sc,7*sc);
  ctx.fillStyle=`rgba(${c},.9)`; ctx.fill();
  roundRect(ctx, 6*sc,52*sc,18*sc,30*sc,7*sc); ctx.fill();
  // Feet
  roundRect(ctx,-28*sc,78*sc,24*sc,10*sc,5*sc); ctx.fill();
  roundRect(ctx,  4*sc,78*sc,24*sc,10*sc,5*sc); ctx.fill();

  // Head
  roundRect(ctx,-32*sc,-75*sc,64*sc,52*sc,16*sc);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();

  // Face screen
  roundRect(ctx,-22*sc,-68*sc,44*sc,36*sc,10*sc);
  ctx.fillStyle='rgba(0,20,40,.7)'; ctx.fill();

  // Eyes (screens)
  [[-12,-54],[12,-54]].forEach(([ex,ey])=>{
    roundRect(ctx,(ex-8)*sc,ey*sc,16*sc,12*sc,4*sc);
    ctx.fillStyle='#00e5ff'; ctx.fill();
    const eg=ctx.createRadialGradient(ex*sc,(ey+6)*sc,0,ex*sc,(ey+6)*sc,12*sc);
    eg.addColorStop(0,'rgba(0,229,255,.4)'); eg.addColorStop(1,'transparent');
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(ex*sc,(ey+6)*sc,12*sc,0,Math.PI*2); ctx.fill();
  });

  // Mouth bar
  roundRect(ctx,-14*sc,-38*sc,28*sc,6*sc,3*sc);
  ctx.fillStyle='#00e5ff'; ctx.fill();

  ctx.restore();
}

/* ── Mermaid ── */
function drawMermaid(ctx, cx, cy, sc, col, style, rng) {
  const c = hexToRgbArr(col);
  ctx.save(); ctx.translate(cx, cy);

  // Tail fin
  ctx.beginPath();
  ctx.moveTo(-5*sc,60*sc);
  ctx.bezierCurveTo(-40*sc,50*sc,-50*sc,80*sc,-30*sc,90*sc);
  ctx.bezierCurveTo(-10*sc,95*sc,10*sc,95*sc,30*sc,90*sc);
  ctx.bezierCurveTo(50*sc,80*sc,40*sc,50*sc,5*sc,60*sc);
  ctx.fillStyle='rgba(0,188,212,.85)'; ctx.fill();

  // Tail body
  ctx.beginPath(); ctx.ellipse(0,25*sc,20*sc,45*sc,.05,0,Math.PI*2);
  const tg=ctx.createLinearGradient(-20*sc,0,20*sc,70*sc);
  tg.addColorStop(0,`rgb(${c})`);
  tg.addColorStop(1,'rgba(0,150,200,.9)');
  ctx.fillStyle=tg; ctx.fill();

  // Scale pattern on tail
  for(let row=0;row<4;row++) {
    for(let col2=0;col2<3;col2++) {
      ctx.beginPath();
      ctx.arc((-12+col2*12)*sc,(10+row*14)*sc,7*sc,Math.PI,0);
      ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1*sc; ctx.stroke();
    }
  }

  // Torso (upper body)
  ctx.beginPath(); ctx.ellipse(0,-15*sc,20*sc,28*sc,0,0,Math.PI*2);
  ctx.fillStyle='#ffd5b8'; ctx.fill();

  // Shell top
  ctx.beginPath(); ctx.ellipse(-12*sc,-18*sc,10*sc,7*sc,.3,0,Math.PI*2);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();
  ctx.beginPath(); ctx.ellipse(12*sc,-18*sc,10*sc,7*sc,-.3,0,Math.PI*2); ctx.fill();

  // Arms
  ctx.beginPath();
  ctx.moveTo(-18*sc,-20*sc); ctx.bezierCurveTo(-40*sc,-10*sc,-38*sc,20*sc,-22*sc,25*sc);
  ctx.lineWidth=10*sc; ctx.strokeStyle='#ffd5b8'; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(18*sc,-20*sc); ctx.bezierCurveTo(40*sc,-10*sc,38*sc,20*sc,22*sc,25*sc);
  ctx.stroke();

  // Neck & head
  ctx.beginPath(); ctx.arc(0,-48*sc,24*sc,0,Math.PI*2);
  ctx.fillStyle='#ffd5b8'; ctx.fill();

  // Hair
  ctx.beginPath();
  ctx.moveTo(-24*sc,-55*sc);
  ctx.bezierCurveTo(-50*sc,-40*sc,-45*sc,10*sc,-25*sc,20*sc);
  ctx.bezierCurveTo(-20*sc,25*sc,-18*sc,15*sc,-15*sc,5*sc);
  ctx.bezierCurveTo(-20*sc,-10*sc,-22*sc,-35*sc,-16*sc,-58*sc);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(24*sc,-55*sc);
  ctx.bezierCurveTo(50*sc,-40*sc,45*sc,10*sc,25*sc,20*sc);
  ctx.bezierCurveTo(20*sc,25*sc,18*sc,15*sc,15*sc,5*sc);
  ctx.bezierCurveTo(20*sc,-10*sc,22*sc,-35*sc,16*sc,-58*sc);
  ctx.fillStyle=`rgb(${c})`; ctx.fill();
  // Hair top
  ctx.beginPath(); ctx.arc(0,-60*sc,20*sc,Math.PI,0);
  ctx.fill();

  // Eyes
  [[-9,-50],[9,-50]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.ellipse(ex*sc,ey*sc,5*sc,6.5*sc,0,0,Math.PI*2);
    ctx.fillStyle='#333'; ctx.fill();
    ctx.beginPath(); ctx.arc((ex-1)*sc,(ey-1)*sc,1.5*sc,0,Math.PI*2);
    ctx.fillStyle='white'; ctx.fill();
    // Lashes
    for(let l=-2;l<=2;l++){
      ctx.beginPath(); ctx.moveTo((ex+l*2)*sc,(ey-6)*sc); ctx.lineTo((ex+l*1.8)*sc,(ey-9)*sc);
      ctx.strokeStyle='#333'; ctx.lineWidth=1.2*sc; ctx.stroke();
    }
  });

  // Smile
  ctx.beginPath(); ctx.arc(0,-45*sc,8*sc,.1,Math.PI-.1);
  ctx.strokeStyle='#d4726e'; ctx.lineWidth=1.8*sc; ctx.stroke();

  // Flower hair accessory
  drawFlowerCluster(ctx,-18*sc,-66*sc,sc*.7,'#ff80ab');

  ctx.restore();
}

/* ── Pixel subject (special style) ── */
function drawPixelSubject(ctx, t, cx, cy, sc, col, rng) {
  ctx.imageSmoothingEnabled = false;
  const ps = Math.max(4, Math.round(5*sc)); // pixel size
  const c = hexToRgbArr(col);

  // Define pixel art grids per theme (16x16 logical pixels)
  const GRIDS = {
    cat: [
      '0011110000000000',
      '0112221100000000',
      '1122222110011001',
      '1222222211022201',
      '1222222211022201',
      '1222222111011001',
      '0112111100000000',
      '0011100000000000',
      '0011100000000000',
      '0011111000000000',
      '0011222100000000',
      '0012222110000000',
      '0011222100000000',
      '0001111000000000',
      '0000110000000000',
      '0000100000000000'
    ],
    dragon: [
      '0000000011000000',
      '0000000111100000',
      '0001100111111000',
      '0111110111111100',
      '1111111011111100',
      '0111110001111100',
      '0001100001111000',
      '0000000001110000',
      '0000000001110000',
      '0000000011110000',
      '0000000011100000',
      '0000000011000000',
      '0000000110000000',
      '0000001110000000',
      '0000001100000000',
      '0000001000000000'
    ],
    robot: [
      '0011111111110000',
      '0110000000011000',
      '0101001001010000',
      '0101001001010000',
      '0110000000011000',
      '0011111111110000',
      '0000111111100000',
      '0001001100100000',
      '0001002200100000',
      '0001002200100000',
      '0001001100100000',
      '0000111111100000',
      '0001100001100000',
      '0011100001110000',
      '0011000000110000',
      '0011000000110000'
    ],
    mermaid: [
      '0000011110000000',
      '0000122221000000',
      '0001222222100000',
      '0001222222100000',
      '0000112211000000',
      '0000011110000000',
      '0000013310000000',
      '0000133331000000',
      '0001333333100000',
      '0001333333100000',
      '0000333333000000',
      '0000033330000000',
      '0000033330000000',
      '0000133331000000',
      '0001133311000000',
      '0001100011000000'
    ]
  };

  const grid = GRIDS[t];
  const startX = cx - 8*ps;
  const startY = cy - 8*ps;
  const COLORS = {
    '1': `rgb(${c})`,
    '2': `rgba(255,255,255,0.4)`,
    '3': 'rgba(0,200,255,0.7)'
  };

  grid.forEach((row, ri) => {
    row.split('').forEach((cell, ci) => {
      if (cell !== '0') {
        ctx.fillStyle = COLORS[cell] || `rgb(${c})`;
        ctx.fillRect(startX + ci*ps, startY + ri*ps, ps, ps);

        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(startX + ci*ps, startY + ri*ps, ps/2, ps/2);
      }
    });
  });
}

/* ── Element overlays ── */
function drawElement(ctx, e, W, H, rng) {
  const cx=W/2, cy=H/2;
  const sc = Math.min(W,H)/320;

  if (e==='flowers') {
    const positions = [[-60,-30],[60,-20],[-70,20],[65,10],[0,-60]];
    const colors=['#ff80ab','#ff5252','#ff9800','#ea80fc','#ff4081'];
    positions.forEach(([dx,dy],i)=>{
      drawFlowerCluster(ctx,cx+dx*sc,cy+dy*sc,sc*.8,colors[i%colors.length]);
    });
    // Petals falling
    for(let i=0;i<8;i++){
      const px=rng()*W, py=rng()*H*.7;
      drawPetal(ctx,px,py,sc*.5,'#ff80ab',rng()*Math.PI*2);
    }

  } else if (e==='lightning') {
    // Main bolt
    ctx.save();
    ctx.shadowColor='#ffe000'; ctx.shadowBlur=20;
    const boltPath=[[cx-10*sc,cy-80*sc],[cx+20*sc,cy-30*sc],
                    [cx-5*sc,cy-20*sc],[cx+25*sc,cy+50*sc]];
    ctx.beginPath(); ctx.moveTo(...boltPath[0]);
    boltPath.slice(1).forEach(p=>ctx.lineTo(...p));
    ctx.strokeStyle='#ffe000'; ctx.lineWidth=5*sc; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.stroke();
    // Glow layer
    ctx.lineWidth=12*sc; ctx.strokeStyle='rgba(255,220,0,0.25)'; ctx.stroke();
    ctx.restore();
    // Smaller bolts
    for(let i=0;i<3;i++){
      ctx.save(); ctx.shadowColor='#fff'; ctx.shadowBlur=8;
      const bx=cx+(-50+i*50)*sc, by=cy-60*sc;
      ctx.beginPath(); ctx.moveTo(bx,by);
      ctx.lineTo(bx+15*sc,by+30*sc); ctx.lineTo(bx+5*sc,by+35*sc); ctx.lineTo(bx+18*sc,by+55*sc);
      ctx.strokeStyle='rgba(255,240,100,.6)'; ctx.lineWidth=2.5*sc;
      ctx.lineJoin='round'; ctx.stroke(); ctx.restore();
    }
    // Electric sparks
    for(let i=0;i<12;i++){
      ctx.beginPath(); ctx.arc(cx+(-60+rng()*120)*sc,cy+(-80+rng()*80)*sc,1.5*sc,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,100,${rng()*.6+.2})`; ctx.fill();
    }

  } else if (e==='bubbles') {
    const bubbleData=[
      {x:-.5,y:-.6,r:22,a:.7},{x:.4,y:-.5,r:16,a:.6},{x:-.7,y:.1,r:14,a:.65},
      {x:.6,y:.2,r:18,a:.55},{x:.1,y:-.8,r:12,a:.7},{x:-.3,y:.5,r:10,a:.6},
      {x:.5,y:-.2,r:8,a:.65},{x:-.6,y:-.3,r:20,a:.5}
    ];
    bubbleData.forEach(({x,y,r,a})=>{
      const bx=cx+x*W*.45, by=cy+y*H*.45, br=r*sc;
      // Rainbow gradient
      const hue = rng()*360;
      const bg=ctx.createRadialGradient(bx-br*.3,by-br*.3,0,bx,by,br);
      bg.addColorStop(0,`hsla(${hue},80%,90%,${a*.5})`);
      bg.addColorStop(.7,`hsla(${hue+60},60%,60%,${a*.3})`);
      bg.addColorStop(1,`hsla(${hue},70%,50%,${a*.6})`);
      ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2);
      ctx.fillStyle=bg; ctx.fill();
      ctx.strokeStyle=`hsla(${hue},70%,80%,${a})`;
      ctx.lineWidth=1.5*sc; ctx.stroke();
      // Shine
      ctx.beginPath(); ctx.arc(bx-br*.3,by-br*.3,br*.2,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a*.6})`; ctx.fill();
    });

  } else if (e==='stars') {
    const starPositions=[
      [-70,-70,18],[70,-60,14],[-80,20,10],[75,25,16],
      [-40,-85,12],[40,-80,20],[0,-95,8],[-60,50,10],[60,55,12]
    ];
    starPositions.forEach(([dx,dy,r])=>{
      drawStar(ctx,cx+dx*sc,cy+dy*sc,r*sc,'#FFD700','#FFF8DC');
    });
    // Sparkle trail
    for(let i=0;i<15;i++){
      const sx=rng()*W, sy=rng()*H*.6, ss=rng()*3+1;
      ctx.beginPath(); ctx.arc(sx,sy,ss*sc,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,215,0,${rng()*.7+.2})`; ctx.fill();
    }
  }
}

/* ── Style post effects ── */
function drawStylePostEffect(ctx, s, W, H, rng) {
  if (s === 'cartoon') {
    /* ★ CARTOON：加強輪廓感 + 色調鮮豔化 + 半透明漸層高光 */
    // 漫畫速度線（放射狀）
    ctx.save();
    ctx.globalAlpha=0.06;
    ctx.strokeStyle='#000';
    const cx=W/2, cy=H/2;
    for(let i=0;i<24;i++){
      const a=i*(Math.PI*2/24);
      ctx.lineWidth=1+rng()*2;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a)*60, cy+Math.sin(a)*60);
      ctx.lineTo(cx+Math.cos(a)*Math.max(W,H), cy+Math.sin(a)*Math.max(W,H));
      ctx.stroke();
    }
    ctx.restore();
    // 白色漫畫高光橢圓（左上角）
    ctx.save();
    ctx.globalAlpha=0.15;
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.ellipse(W*.25, H*.18, W*.12, H*.07, -.4, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    // 飽和度加強 overlay
    ctx.globalCompositeOperation='saturation';
    ctx.fillStyle='rgba(255,100,50,0.08)';
    ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='source-over';

  } else if (s === 'watercolor') {
    /* ★ WATERCOLOR：紙張紋理 + 水彩邊緣暈散 + 紙色整體覆蓋 */
    // 紙張纖維紋（大量細小灰點）
    ctx.save();
    for(let i=0;i<400;i++){
      const x=rng()*W, y=rng()*H, sz=rng()*1.8;
      const grey=Math.floor(180+rng()*60);
      ctx.fillStyle=`rgba(${grey},${grey},${grey},${rng()*.06})`;
      ctx.fillRect(x,y,sz,sz);
    }
    // 水彩邊緣暈染（四邊向內淡出）
    const edgeTop=ctx.createLinearGradient(0,0,0,H*.15);
    edgeTop.addColorStop(0,'rgba(255,252,240,0.45)'); edgeTop.addColorStop(1,'transparent');
    ctx.fillStyle=edgeTop; ctx.fillRect(0,0,W,H*.15);
    const edgeBot=ctx.createLinearGradient(0,H*.85,0,H);
    edgeBot.addColorStop(0,'transparent'); edgeBot.addColorStop(1,'rgba(255,252,240,0.4)');
    ctx.fillStyle=edgeBot; ctx.fillRect(0,H*.85,W,H*.15);
    const edgeL=ctx.createLinearGradient(0,0,W*.1,0);
    edgeL.addColorStop(0,'rgba(255,252,240,0.3)'); edgeL.addColorStop(1,'transparent');
    ctx.fillStyle=edgeL; ctx.fillRect(0,0,W*.1,H);
    const edgeR=ctx.createLinearGradient(W*.9,0,W,0);
    edgeR.addColorStop(0,'transparent'); edgeR.addColorStop(1,'rgba(255,252,240,0.3)');
    ctx.fillStyle=edgeR; ctx.fillRect(W*.9,0,W*.1,H);
    // 整體暖色紙調疊加
    ctx.fillStyle='rgba(255,248,220,0.12)'; ctx.fillRect(0,0,W,H);
    ctx.restore();

  } else if (s === 'pixel') {
    /* ★ PIXEL：強化像素網格 + CRT 掃描線 + 色彩量化（低彩度抖動）*/
    // 像素網格
    ctx.save();
    const PS=8;
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.5;
    for(let x=0;x<=W;x+=PS){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=0;y<=H;y+=PS){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    // CRT 水平掃描線
    ctx.globalAlpha=0.08;
    ctx.fillStyle='#000';
    for(let y=0;y<H;y+=4){ ctx.fillRect(0,y,W,2); }
    // 螢幕邊角暗角
    const crt=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.85);
    crt.addColorStop(0,'transparent'); crt.addColorStop(1,'rgba(0,0,0,0.45)');
    ctx.globalAlpha=1; ctx.fillStyle=crt; ctx.fillRect(0,0,W,H);
    // 螢幕反光（左上弧形高光）
    ctx.globalAlpha=0.07; ctx.fillStyle='white';
    ctx.beginPath(); ctx.ellipse(W*.2,H*.15,W*.35,H*.2,-.2,0,Math.PI*2); ctx.fill();
    ctx.restore();

  } else if (s === 'oilpainting') {
    /* ★ OIL PAINTING：畫框暗角 + 帆布厚塗筆觸 + 古典暖黃色調 */
    // 大量帆布筆觸（隨機方向的短矩形）
    ctx.save();
    for(let i=0;i<120;i++){
      const x=rng()*W, y=rng()*H;
      const l=(8+rng()*28), w=(1.5+rng()*3);
      const a=rng()*Math.PI;
      const bright=rng()>.65;
      ctx.save(); ctx.translate(x,y); ctx.rotate(a);
      ctx.fillStyle=bright ? `rgba(255,245,200,${rng()*.09})` : `rgba(0,0,0,${rng()*.07})`;
      ctx.fillRect(-l/2,-w/2,l,w);
      ctx.restore();
    }
    // 古典暖黃色調（琥珀glazing）
    ctx.fillStyle='rgba(180,120,30,0.1)'; ctx.fillRect(0,0,W,H);
    // 深色暗角（強烈畫框效果）
    const darkVig=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.9);
    darkVig.addColorStop(0,'transparent');
    darkVig.addColorStop(0.55,'rgba(10,5,0,0.15)');
    darkVig.addColorStop(1,'rgba(0,0,0,0.65)');
    ctx.fillStyle=darkVig; ctx.fillRect(0,0,W,H);
    // 畫框邊線（模擬畫布邊緣）
    ctx.strokeStyle='rgba(80,40,10,0.4)'; ctx.lineWidth=6;
    ctx.strokeRect(3,3,W-6,H-6);
    ctx.restore();
  }
}

/* ── Drawing helpers ── */
function drawFlowerCluster(ctx, cx, cy, sc, color) {
  for(let i=0;i<5;i++){
    const a=i*(Math.PI*2/5);
    ctx.beginPath(); ctx.ellipse(
      cx+Math.cos(a)*8*sc, cy+Math.sin(a)*8*sc, 6*sc, 4*sc, a, 0, Math.PI*2
    );
    ctx.fillStyle=color; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx,cy,5*sc,0,Math.PI*2);
  ctx.fillStyle='#fff9c4'; ctx.fill();
}
function drawPetal(ctx, x, y, sc, color, angle) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.beginPath(); ctx.ellipse(0,0,4*sc,8*sc,0,0,Math.PI*2);
  ctx.fillStyle=hexAlpha(color,.55); ctx.fill(); ctx.restore();
}
function drawStar(ctx, cx, cy, r, col1, col2) {
  const n=5, inner=r*.45;
  const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  sg.addColorStop(0,col2); sg.addColorStop(1,col1);
  ctx.beginPath();
  for(let i=0;i<n*2;i++){
    const a=i*Math.PI/n - Math.PI/2;
    const rv=i%2===0?r:inner;
    i===0 ? ctx.moveTo(cx+Math.cos(a)*rv,cy+Math.sin(a)*rv)
          : ctx.lineTo(cx+Math.cos(a)*rv,cy+Math.sin(a)*rv);
  }
  ctx.closePath();
  ctx.fillStyle=sg; ctx.fill();
  // glow
  const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.5);
  glow.addColorStop(0,'rgba(255,215,0,0.3)'); glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(cx,cy,r*1.5,0,Math.PI*2); ctx.fill();
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

/* ── Colour helpers ── */
function hexToRgb(hex) {
  hex=hex.replace('#','');
  if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  const n=parseInt(hex,16);
  return `${(n>>16)&255},${(n>>8)&255},${n&255}`;
}
function hexToRgbArr(hex){ return hexToRgb(hex); }
function hexAlpha(hex,a){ return `rgba(${hexToRgb(hex)},${a})`; }

const DB_CONFIG = {
  enabled:  false,
  endpoint: '/api/ch3-prompt-builder/log'
};
async function dbLog(row) {
  console.table(row);
  if (!DB_CONFIG.enabled) return;
  try {
    const res = await fetch(DB_CONFIG.endpoint, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify(row)
    });
    if (!res.ok) console.warn('[DB] failed:', res.status);
  } catch(e){ console.warn('[DB]', e); }
}

/* ══════════════════════════════════════════════════
   ⑤  GAME STATE
══════════════════════════════════════════════════ */
let G = {};
function resetState() {
  G = {
    sessionId:   crypto.randomUUID?.() || Date.now().toString(36),
    useCount:    0,
    gameStart:   Date.now(),
    slotCanvases:[]   // store canvas refs for end-screen thumbs
  };
}

/* ══════════════════════════════════════════════════
   ⑥  INIT
══════════════════════════════════════════════════ */
function initGame() {
  resetState();
  buildSparkles();
  updateUseDots();

  // Reset selects
  ['selTheme','selStyle','selElement','selBg'].forEach(id=>{
    document.getElementById(id).value='';
    document.getElementById(id).classList.remove('chosen');
  });

  // Reset slots
  [0,1,2].forEach(i=>{
    const slot=document.getElementById('slot'+i);
    // Remove canvas wrap if exists
    const cw=slot.querySelector('.slot-canvas-wrap');
    if(cw) cw.remove();
    // Show empty placeholder
    const empty=slot.querySelector('.slot-empty');
    if(empty) empty.style.display='flex';
    slot.classList.remove('filled');
    const info=document.getElementById('info'+i);
    info.innerHTML=''; info.classList.remove('show');
  });

  G.slotCanvases=[];
  onSelectChange();
}

/* Sparkles */
function buildSparkles() {
  const wrap=document.getElementById('sparkles');
  wrap.innerHTML='';
  const emojis=['✨','⭐','🌟','💫','🎨','🖌️','🌈'];
  for(let i=0;i<12;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.textContent=emojis[i%emojis.length];
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*80+10}%;
      --sf-t:${3+Math.random()*3}s;--sf-d:${Math.random()*4}s;`;
    wrap.appendChild(s);
  }
}

function updateUseDots() {
  for(let i=0;i<3;i++){
    document.getElementById('dot'+i).classList.toggle('used', i < G.useCount);
  }
}

/* ══════════════════════════════════════════════════
   ⑦  SELECT CHANGE → UPDATE PROMPT DISPLAY
══════════════════════════════════════════════════ */
function onSelectChange() {
  const t=document.getElementById('selTheme').value;
  const s=document.getElementById('selStyle').value;
  const e=document.getElementById('selElement').value;
  const b=document.getElementById('selBg').value;

  // Update select visual state
  ['selTheme','selStyle','selElement','selBg'].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.toggle('chosen', el.value!=='');
  });

  const allChosen = t && s && e && b;
  const btn=document.getElementById('generateBtn');
  btn.classList.toggle('ready', allChosen && G.useCount<3);

  const promptEl=document.getElementById('promptText');
  if (!allChosen) {
    const missing=[];
    if(!t) missing.push('主題');
    if(!s) missing.push('風格');
    if(!e) missing.push('元素');
    if(!b) missing.push('背景');
    promptEl.innerHTML=`<span class="placeholder">還需要選擇：${missing.join('、')}…</span>`;
    return;
  }

  const text=buildPrompt(t,s,e,b);
  const to=OPTS.theme[t], so=OPTS.style[s], eo=OPTS.element[e], bo=OPTS.bg[b];

  promptEl.innerHTML =
    `<span class="tag tag-theme">${to.emoji} ${to.label}</span> ` +
    `<span class="tag tag-style">${so.emoji} ${so.label}</span> ` +
    `<span class="tag tag-element">${eo.emoji} ${eo.label}</span> ` +
    `<span class="tag tag-bg">${OPTS.theme.cat.emoji.replace('🐱','🌄')} ${bo.label}</span>` +
    `：${text}`;
}

/* ══════════════════════════════════════════════════
   ⑧  GENERATE IMAGE
══════════════════════════════════════════════════ */
function generateImage() {
  if (G.useCount >= 3) return;

  const t=document.getElementById('selTheme').value;
  const s=document.getElementById('selStyle').value;
  const e=document.getElementById('selElement').value;
  const b=document.getElementById('selBg').value;
  if (!t||!s||!e||!b) return;

  const slotIdx=G.useCount;
  const slot=document.getElementById('slot'+slotIdx);

  // Show generating overlay
  const overlay=document.createElement('div');
  overlay.className='gen-overlay';
  overlay.innerHTML='<div class="gen-spinner"></div><div class="gen-text">AI 正在繪圖中…✨</div>';
  slot.appendChild(overlay);

  setTimeout(()=>{
    overlay.remove();
    renderSlot(slot, slotIdx, t, s, e, b);
  }, 1200);

  G.useCount++;
  updateUseDots();

  // Update button text after first generation
  const btn=document.getElementById('generateBtn');
  if (G.useCount === 1) {
    btn.innerHTML='🔄 再次生成圖片';
  }

  // DB log
  dbLog({
    session_id:  G.sessionId,
    played_at:   new Date().toISOString(),
    use_count:   G.useCount,
    theme:       t, style:s, element:e, background:b,
    prompt_text: buildPrompt(t,s,e,b),
    end_action:  null, total_time_sec:null
  });

  // Disable button if max reached (after brief delay)
  setTimeout(()=>{
    if (G.useCount>=3) {
      const btn=document.getElementById('generateBtn');
      btn.classList.remove('ready');
      btn.textContent='已達 3 次上限';
      showEndOverlay();
    }
  }, 1800);
}

function renderSlot(slot, slotIdx, t, s, e, b) {
  // Remove empty placeholder
  const empty=slot.querySelector('.slot-empty');
  if(empty) empty.style.display='none';

  // Create canvas
  const wrap=document.createElement('div');
  wrap.className='slot-canvas-wrap';
  const canvas=document.createElement('canvas');
  wrap.appendChild(canvas);
  slot.insertBefore(wrap, document.getElementById('info'+slotIdx));

  // Draw
  drawImage(canvas, t, s, e, b);
  G.slotCanvases[slotIdx]=canvas;

  slot.classList.add('filled','slot-appear');

  // Info bar
  const to=OPTS.theme[t], so=OPTS.style[s], eo=OPTS.element[e], bo=OPTS.bg[b];
  const info=document.getElementById('info'+slotIdx);
  info.innerHTML=`
    <div class="slot-info-tags">
      <span class="slot-info-tag sit-theme">${to.emoji} ${to.label}</span>
      <span class="slot-info-tag sit-style">${so.emoji} ${so.label}</span>
      <span class="slot-info-tag sit-element">${eo.emoji} ${eo.label}</span>
      <span class="slot-info-tag sit-bg">🌄 ${bo.label}</span>
    </div>
    <div class="slot-info-prompt">${buildPrompt(t,s,e,b).slice(0,60)}…</div>`;
  info.classList.add('show');

  // Resize canvas to actual pixel dimensions
  setTimeout(()=>{
    const W=wrap.offsetWidth, H=wrap.offsetHeight;
    if(W>0&&H>0){ canvas.width=W; canvas.height=H; drawImage(canvas,t,s,e,b); }
  }, 50);

  // Confetti on first best image
  if(slotIdx===0) spawnConfetti();
}

/* ══════════════════════════════════════════════════
   ⑨  END OVERLAY
══════════════════════════════════════════════════ */
function showEndOverlay() {
  setTimeout(()=>{
    // Build end gallery thumbs
    const gallEl=document.getElementById('endGallery');
    gallEl.innerHTML='';
    G.slotCanvases.forEach(src=>{
      if(!src) return;
      const thumb=document.createElement('div');
      thumb.className='end-thumb';
      // Clone canvas content
      const mini=document.createElement('canvas');
      mini.width=70; mini.height=70;
      const mctx=mini.getContext('2d');
      mctx.drawImage(src,0,0,70,70);
      thumb.appendChild(mini);
      gallEl.appendChild(thumb);
    });
    document.getElementById('endOverlay').classList.add('show');
    spawnConfetti();
  }, 400);
}

document.getElementById('btnRetry').addEventListener('click',()=>{
  dbLog({session_id:G.sessionId,played_at:new Date().toISOString(),
    use_count:3,theme:null,style:null,element:null,background:null,
    prompt_text:null,end_action:'retry',
    total_time_sec:Math.round((Date.now()-G.gameStart)/1000)});
  document.getElementById('endOverlay').classList.remove('show');
  document.getElementById('generateBtn').classList.add('ready');
  document.getElementById('generateBtn').innerHTML='✨ 生成圖片';
  initGame();
});

document.getElementById('btnExit').addEventListener('click',()=>{
  dbLog({session_id:G.sessionId,played_at:new Date().toISOString(),
    use_count:3,theme:null,style:null,element:null,background:null,
    prompt_text:null,end_action:'exit',
    total_time_sec:Math.round((Date.now()-G.gameStart)/1000)});
  window.close();
  // Fallback if window.close doesn't work
  document.getElementById('endOverlay').classList.remove('show');
  document.getElementById('app').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:70vh;gap:18px;text-align:center;animation:scaleIn .6s both;">
      <div style="font-size:5rem">🎨</div>
      <h2 style="font-family:Nunito,sans-serif;font-size:2rem;font-weight:900;
        background:linear-gradient(120deg,#ff5722,#e91e8c);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
        掰掰！繼續創作！</h2>
      <p style="color:#4a5f7a;max-width:300px;line-height:1.7;font-size:.9rem;">
        你的提示詞組合創造了獨特的圖片，<br>這就是和 AI 一起創作的魔法！🌟</p>
    </div>`;
});

/* ══════════════════════════════════════════════════
   ⑩  CONFETTI
══════════════════════════════════════════════════ */
function spawnConfetti() {
  const wrap=document.getElementById('confettiWrap');
  const cols=['#ff5722','#e91e8c','#7c3aed','#00b8d4','#ffc107','#00c853'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='conf';
    const sz=6+Math.random()*10;
    c.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz*(.4+Math.random()*.6)}px;
      background:${cols[i%cols.length]};transform:rotate(${Math.random()*360}deg);
      --cf-t:${1.3+Math.random()*.9}s;--cf-d:${Math.random()*.6}s;
      --cf-drift:${(Math.random()-.5)*180}px;`;
    wrap.appendChild(c);
  }
  setTimeout(()=>wrap.innerHTML='', 2800);
}

/* ══════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════ */
initGame();

/* ── Google Sites iframe 高度通報（自動適配）──
   Google Sites 嵌入時建議手動將 iframe 高度設為 700px
   此程式碼同時通報父層視窗實際高度供參考            */
(function(){
  function reportHeight(){
    const h = document.documentElement.scrollHeight;
    try { window.parent.postMessage({ type:'iframeHeight', height: h }, '*'); } catch(e){}
  }
  reportHeight();
  window.addEventListener('resize', reportHeight);
})();
</script>
