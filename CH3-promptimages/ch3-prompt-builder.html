<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- ── Google Drive / Google Sites iframe 相容性設定 ── -->
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="referrer" content="no-referrer">
<title>畫圖提示詞建構器｜第三章・AI 小任務</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

/* ═══════════════════════════════════════
   DESIGN TOKENS  (與系列保持一致)
═══════════════════════════════════════ */
:root {
  --sky:         #e8f4fd;
  --sky-deep:    #c8e6f8;
  --white:       #ffffff;
  --ink:         #1e2d4a;
  --ink-soft:    #4a5f7a;
  --ink-faint:   #8a9bb5;

  --teal:        #00b8d4;
  --teal-glow:   rgba(0,184,212,0.25);

  --rose:        #e91e8c;
  --rose-glow:   rgba(233,30,140,0.25);

  --amber:       #ff8f00;
  --amber-glow:  rgba(255,143,0,0.28);

  --violet:      #7c3aed;
  --violet-light:#a855f7;
  --violet-glow: rgba(124,58,237,0.25);

  --green:       #00c853;
  --green-glow:  rgba(0,200,83,0.28);

  --gold:        #ffc107;
  --gold-deep:   #ff8f00;
  --gold-glow:   rgba(255,193,7,0.5);

  --orange:      #ff5722;
  --orange-glow: rgba(255,87,34,0.25);

  --card-shadow: 0 8px 32px rgba(30,45,74,0.12);
  --card-radius: 22px;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

/* ── iframe 完整顯示：鎖定視窗高度，完全禁止捲動 ── */
html {
  height: 100%;
  overflow: auto;
}

body {
  font-family:'Noto Sans TC','Nunito',sans-serif;
  background:var(--sky);
  color:var(--ink);
  min-height: 100%;
  overflow: auto;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 15%, rgba(255,87,34,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 85%, rgba(124,58,237,0.1) 0%, transparent 60%),
    linear-gradient(180deg,#fdf4e8 0%,#fef9f2 40%,#f8fbff 100%);
  z-index:0; pointer-events:none;
}

/* Floating sparkles */
.sparkles { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.sparkle  {
  position:absolute; font-size:1rem; opacity:0;
  animation:sparkFloat var(--sf-t) ease-in-out infinite var(--sf-d);
}
@keyframes sparkFloat {
  0%   { opacity:0; transform:translateY(0) scale(.5) rotate(0deg); }
  30%  { opacity:.7; }
  70%  { opacity:.4; }
  100% { opacity:0; transform:translateY(-60px) scale(1) rotate(180deg); }
}

/* ═══════════════════════════════════════
   APP SHELL — 固定視窗高度，三段垂直分配
═══════════════════════════════════════ */
#app {
  position: relative; z-index: 1;
  min-height: 100dvh;         /* 最小撐滿視窗，內容超出可捲動 */
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 12px 32px;
  max-width: 1100px;
  margin: 0 auto;
  gap: 0;
}

/* ── 平板直立或小屏幕高度：增加底部填充 ── */
@media (max-height: 800px), (orientation: portrait) and (max-width: 1024px) {
  #app {
    padding-bottom: 48px;
  }
}

/* ── 更小的屏幕高度：進一步增加填充 ── */
@media (max-height: 600px) {
  #app {
    padding-bottom: 60px;
  }
}

/* ── Top bar ── */
.top-bar {
  width:100%; flex-shrink: 0;
  display:flex; align-items:center; justify-content:space-between;
  padding: 8px 0 4px;
  animation:slideDown .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-24px);} to{opacity:1;transform:none;} }

.chapter-tag {
  display:inline-flex; align-items:center; gap:6px;
  background:white; border-radius:99px; padding:4px 12px;
  font-size:.72rem; font-weight:700; color:var(--orange);
  box-shadow:0 2px 10px var(--orange-glow); letter-spacing:.04em;
}
.use-counter {
  display:flex; align-items:center; gap:8px;
  background:white; border-radius:99px; padding:4px 14px;
  font-size:.78rem; font-weight:700; color:var(--ink);
  box-shadow:0 2px 10px rgba(30,45,74,.1);
}
.use-dots { display:flex; gap:5px; }
.use-dot  {
  width:11px; height:11px; border-radius:50%;
  border:2px solid rgba(30,45,74,.2);
  transition:background .3s, border-color .3s, box-shadow .3s;
}
.use-dot.used { background:var(--orange); border-color:var(--orange); box-shadow:0 0 8px var(--orange-glow); }

/* ── Title ── */
.page-title {
  text-align:center; flex-shrink: 0;
  margin-bottom: 6px;
  animation:slideDown .6s .1s cubic-bezier(.22,1,.36,1) both;
}
.page-title h1 {
  font-family:'Nunito','Noto Sans TC',sans-serif;
  font-size:clamp(1.2rem,3.5vw,1.9rem); font-weight:900; line-height:1.1; color:var(--ink);
}
.page-title h1 em {
  font-style:normal;
  background:linear-gradient(120deg,var(--orange),var(--rose));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.page-title p { margin-top:3px; font-size:.78rem; color:var(--ink-faint); font-weight:500; }

/* ═══════════════════════════════════════
   ── TOP SECTION: SELECTORS ──
═══════════════════════════════════════ */
.selectors-panel {
  width:100%; flex-shrink: 0;
  background:white; border-radius:var(--card-radius);
  box-shadow:var(--card-shadow);
  border:2px solid rgba(255,87,34,.15);
  padding: 10px 14px;
  margin-bottom: 8px;
  animation:slideDown .6s .2s cubic-bezier(.22,1,.36,1) both;
  position:relative; overflow:hidden;
}
.selectors-panel::before {
  content:''; position:absolute; top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg,var(--orange),var(--rose),var(--violet),var(--teal));
}

.selectors-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:clamp(10px,2vw,18px);
}
@media(max-width:620px){ .selectors-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:360px){ .selectors-grid { grid-template-columns:1fr; } }

.selector-group { display:flex; flex-direction:column; gap:4px; }

.selector-label {
  font-size:.68rem; font-weight:800; letter-spacing:.08em;
  display:flex; align-items:center; gap:4px;
}
.selector-label.theme   { color:var(--orange); }
.selector-label.style   { color:var(--rose);   }
.selector-label.element { color:var(--violet); }
.selector-label.bg      { color:var(--teal);   }

.selector-label .lbl-icon { font-size:1rem; }

/* Custom select wrapper */
.sel-wrap {
  position:relative;
}
.sel-wrap::after {
  content:'▾';
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  font-size:.9rem; color:var(--ink-faint); pointer-events:none;
}

select {
  width:100%; padding:7px 30px 7px 10px;
  border-radius:12px; border:2px solid rgba(30,45,74,.1);
  background:var(--sky); color:var(--ink);
  font-family:'Noto Sans TC','Nunito',sans-serif;
  font-size:clamp(.75rem,1.8vw,.88rem); font-weight:600;
  appearance:none; -webkit-appearance:none;
  cursor:pointer; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
select:focus { border-color:var(--orange); box-shadow:0 0 0 3px var(--orange-glow); }

select.theme-sel:focus   { border-color:var(--orange); box-shadow:0 0 0 3px var(--orange-glow); }
select.style-sel:focus   { border-color:var(--rose);   box-shadow:0 0 0 3px var(--rose-glow);   }
select.element-sel:focus { border-color:var(--violet); box-shadow:0 0 0 3px var(--violet-glow); }
select.bg-sel:focus      { border-color:var(--teal);   box-shadow:0 0 0 3px var(--teal-glow);   }

/* Selected visual indicator */
select.chosen { border-color:var(--green); background:linear-gradient(135deg,#f0fff4,#e8fff0); }

/* ═══════════════════════════════════════
   ── MIDDLE SECTION: PROMPT + BUTTON ──
═══════════════════════════════════════ */
.middle-panel {
  width:100%; flex-shrink: 0;
  background:white; border-radius:var(--card-radius);
  box-shadow:var(--card-shadow);
  border:2px solid rgba(30,45,74,.08);
  padding: 8px 14px;
  margin-bottom: 8px;
  animation:slideDown .6s .3s cubic-bezier(.22,1,.36,1) both;
  display:flex; align-items:center; gap:clamp(10px,2vw,18px);
  flex-wrap:wrap;
}

.prompt-area { flex:1; min-width:0; }
.prompt-label {
  font-size:.66rem; font-weight:800; letter-spacing:.1em;
  color:var(--orange); margin-bottom:4px;
}
.prompt-text {
  font-size:clamp(.75rem,1.8vw,.88rem); line-height:1.55;
  color:var(--ink-soft); font-style:italic;
  background:linear-gradient(135deg,#fff8f0,#fff3e6);
  border-left:4px solid var(--orange);
  border-radius:0 10px 10px 0;
  padding:7px 12px;
  min-height:38px;
  display:flex; align-items:center;
  transition:all .4s cubic-bezier(.22,1,.36,1);
}
.prompt-text .placeholder { color:var(--ink-faint); font-style:italic; }
.prompt-text .tag {
  display:inline-block; border-radius:6px; padding:1px 7px;
  font-weight:700; font-style:normal; margin:1px 2px;
}
.tag-theme   { background:rgba(255,87,34,.15);   color:var(--orange); }
.tag-style   { background:rgba(233,30,140,.12);  color:var(--rose);   }
.tag-element { background:rgba(124,58,237,.12);  color:var(--violet); }
.tag-bg      { background:rgba(0,184,212,.12);   color:var(--teal);   }

.generate-btn {
  flex-shrink:0;
  padding: 9px 20px;
  border-radius:99px;
  background:linear-gradient(135deg,var(--orange),var(--rose));
  color:white; font-family:inherit;
  font-size:clamp(.8rem,1.8vw,.92rem); font-weight:800;
  border:none; cursor:pointer;
  box-shadow:0 4px 22px var(--orange-glow);
  transition:transform .2s, box-shadow .2s, opacity .2s;
  white-space:nowrap;
  display:flex; align-items:center; gap:6px;
  opacity:.5; pointer-events:none;
}
.generate-btn.ready { opacity:1; pointer-events:all; }
.generate-btn.ready:hover { transform:translateY(-3px) scale(1.04); box-shadow:0 8px 28px rgba(255,87,34,.5); }
.generate-btn.ready:active { transform:scale(.97); }

/* ═══════════════════════════════════════
   ── BOTTOM SECTION: IMAGE GALLERY ──
   flex:1 → 自動填滿剩餘高度
═══════════════════════════════════════ */
.gallery-section {
  width:100%;
  display: flex;
  flex-direction: column;
  animation:slideDown .6s .4s cubic-bezier(.22,1,.36,1) both;
  padding-bottom: 8px;
}

.gallery-label {
  font-size:.72rem; font-weight:800; letter-spacing:.1em;
  color:var(--ink-faint); margin-bottom:6px; text-align:center;
  flex-shrink: 0;
}

.gallery-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:clamp(6px,1.5vw,14px);
}
@media(max-width:500px){ .gallery-grid { grid-template-columns:1fr; } }

/* Individual image slot — 完全自適應高度 */
.img-slot {
  background:white; border-radius:var(--card-radius);
  box-shadow:var(--card-shadow);
  border:2px solid rgba(30,45,74,.08);
  overflow:hidden;
  display:flex; flex-direction:column;
  transition:box-shadow .3s, border-color .3s;
  position:relative;
  min-height: 0;         /* 允許在 grid 內縮小 */
  aspect-ratio: 16 / 9;  /* 保持統一的 16:9 比例 */
}
.img-slot.slot-1 { border-color:rgba(255,87,34,.2); }
.img-slot.slot-2 { border-color:rgba(233,30,140,.2); }
.img-slot.slot-3 { border-color:rgba(124,58,237,.2); }

.img-slot.filled.slot-1 { box-shadow:var(--card-shadow),0 0 20px rgba(255,87,34,.2); }
.img-slot.filled.slot-2 { box-shadow:var(--card-shadow),0 0 20px rgba(233,30,140,.2); }
.img-slot.filled.slot-3 { box-shadow:var(--card-shadow),0 0 20px rgba(124,58,237,.2); }

/* Slot number badge */
.slot-badge {
  position:absolute; top:10px; left:10px; z-index:5;
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.75rem; font-weight:900; color:white;
}
.slot-1 .slot-badge { background:var(--orange); }
.slot-2 .slot-badge { background:var(--rose);   }
.slot-3 .slot-badge { background:var(--violet); }

/* Empty slot placeholder */
.slot-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:8px;
  padding:20px;
}
.slot-empty-icon { font-size:2.5rem; opacity:.3; }
.slot-empty-text { font-size:.78rem; color:var(--ink-faint); text-align:center; line-height:1.5; }

/* Canvas drawing area — 撐滿 slot 剩餘高度 */
.slot-canvas-wrap {
  flex:1; position:relative; overflow:hidden;
  background:#f8fafc;
  min-height: 0;         /* 關鍵：允許縮小到 flex 分配的高度 */
  display:flex; align-items:center; justify-content:center;
}
.slot-canvas-wrap img {
  position:static; width:100%; height:100%;
  object-fit:contain;  /* ✨ 改為 contain，完整顯示圖片 */
}

/* Slot info bar */
.slot-info {
  padding: 6px 10px 8px;
  border-top:1px solid rgba(30,45,74,.06);
  background:white;
  display:none;
  flex-shrink: 0;
}
.slot-info.show { display:block; }

.slot-info-tags {
  display:flex; flex-wrap:wrap; gap:3px; margin-bottom:3px;
}
.slot-info-tag {
  font-size:.6rem; font-weight:700; padding:1px 6px; border-radius:99px;
}
.sit-theme   { background:rgba(255,87,34,.12);  color:var(--orange); }
.sit-style   { background:rgba(233,30,140,.1);  color:var(--rose);   }
.sit-element { background:rgba(124,58,237,.1);  color:var(--violet); }
.sit-bg      { background:rgba(0,184,212,.1);   color:var(--teal);   }

.slot-info-prompt {
  font-size:.62rem; color:var(--ink-faint); line-height:1.4;
  border-top:1px dashed rgba(30,45,74,.08); padding-top:4px; margin-top:3px;
}

/* ═══════════════════════════════════════
   GENERATE ANIMATION OVERLAY
═══════════════════════════════════════ */
.gen-overlay {
  position:absolute; inset:0; z-index:10;
  background:rgba(255,255,255,.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  border-radius:var(--card-radius);
  animation:fadeIn .3s ease both;
}
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

.gen-spinner {
  width:48px; height:48px;
  border:4px solid rgba(255,87,34,.2);
  border-top-color:var(--orange);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg);} }

.gen-text { font-size:.85rem; font-weight:700; color:var(--orange); }

/* ═══════════════════════════════════════
   END OVERLAY
═══════════════════════════════════════ */
#endOverlay {
  position:fixed; inset:0; z-index:300;
  display:none; align-items:center; justify-content:center;
  padding:20px;
}
#endOverlay.show { display:flex; }
.end-blur { position:absolute; inset:0; background:rgba(232,244,253,.75); backdrop-filter:blur(12px); animation:fadeIn .5s both; }

.end-card {
  position:relative; z-index:1; background:white; border-radius:30px;
  padding:clamp(28px,5vw,52px) clamp(24px,5vw,54px);
  max-width:480px; width:100%; text-align:center;
  box-shadow:0 24px 80px rgba(30,45,74,.22);
  border:2px solid rgba(255,87,34,.25);
  animation:endCardUp .65s .2s cubic-bezier(.22,1,.36,1) both;
}
@keyframes endCardUp { from{opacity:0;transform:translateY(50px) scale(.92);} to{opacity:1;transform:none;} }

.end-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg,var(--orange),var(--rose),var(--violet));
  border-radius:28px 28px 0 0;
}
.end-trophy { font-size:clamp(3rem,8vw,5rem); display:block; margin-bottom:10px; }
.end-title  {
  font-family:'Nunito',sans-serif; font-size:clamp(1.4rem,4vw,2rem); font-weight:900;
  background:linear-gradient(120deg,var(--orange),var(--rose));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:8px;
}
.end-msg { font-size:.9rem; line-height:1.7; color:var(--ink-soft); margin-bottom:28px; }

/* Gallery mini preview */
.end-gallery { display:flex; gap:8px; justify-content:center; margin-bottom:22px; }
.end-thumb {
  width:70px; height:70px; border-radius:12px; overflow:hidden;
  border:2px solid rgba(30,45,74,.1); background:#f0f4f8;
}
.end-thumb canvas { width:100%; height:100%; display:block; }

.end-btns { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
.end-btn  {
  flex:1; min-width:130px; max-width:170px;
  padding:14px 16px; border-radius:16px; border:none; cursor:pointer;
  font-family:inherit; font-size:.95rem; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:7px;
  transition:transform .2s, box-shadow .2s;
}
.end-btn:hover { transform:translateY(-3px); }
.btn-retry { background:linear-gradient(135deg,var(--orange),var(--rose)); color:white; box-shadow:0 5px 20px var(--orange-glow); }
.btn-retry:hover { box-shadow:0 8px 28px rgba(255,87,34,.55); }
.btn-exit  { background:var(--sky-deep,#c8e6f8); color:var(--ink-soft); box-shadow:0 4px 14px rgba(30,45,74,.1); }

/* ═══════════════════════════════════════
   CONFETTI
═══════════════════════════════════════ */
.confetti-wrap { position:fixed; inset:0; z-index:199; pointer-events:none; overflow:hidden; }
.conf { position:absolute; top:-20px; border-radius:3px;
  animation:confFall var(--cf-t) var(--cf-d) ease-in forwards; }
@keyframes confFall {
  0%  { transform:translateY(0) rotate(0) translateX(0); opacity:1; }
  100%{ transform:translateY(110vh) rotate(720deg) translateX(var(--cf-drift)); opacity:.2; }
}

/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
@keyframes scaleIn { from{opacity:0;transform:scale(.85);} to{opacity:1;transform:scale(1);} }
@keyframes fadeUp  { from{opacity:0;transform:translateY(18px);} to{opacity:1;transform:none;} }

.slot-appear { animation:scaleIn .5s cubic-bezier(.22,1,.36,1) both; }
</style>
</head>
<body>

<div class="sparkles" id="sparkles"></div>
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- ══════════════════ END OVERLAY ══════════════════ -->
<div id="endOverlay">
  <div class="end-blur"></div>
  <div class="end-card">
    <span class="end-trophy">🎨</span>
    <div class="end-title">你是提示詞魔法師！</div>
    <div class="end-gallery" id="endGallery"></div>
    <div class="end-msg">你已經完成 3 次圖片生成！<br>每一張圖片都是你獨特的提示詞組合出來的，<br>這就是和 AI 一起創作的魔法！✨</div>
    <div class="end-btns">
      <button class="end-btn btn-retry" id="btnRetry">🔄 再玩一次</button>
      <button class="end-btn btn-exit"  id="btnExit">🚪 退出</button>
    </div>
  </div>
</div>

<!-- ══════════════════ MAIN APP ══════════════════ -->
<div id="app">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="chapter-tag">🎨 第三章・AI 小任務</div>
    <div class="use-counter">
      剩餘次數
      <div class="use-dots">
        <div class="use-dot" id="dot0"></div>
        <div class="use-dot" id="dot1"></div>
        <div class="use-dot" id="dot2"></div>
      </div>
    </div>
  </div>

  <!-- Title -->
  <div class="page-title">
    <h1>畫圖<em>提示詞</em>建構器 🖼️</h1>
    <p>選擇風格、主題、光線、元素，組合出你的 AI 繪圖提示詞！</p>
  </div>

  <!-- ── TOP: SELECTORS ── -->
  <div class="selectors-panel">
    <div class="selectors-grid">

      <div class="selector-group">
        <div class="selector-label theme"><span class="lbl-icon">🎯</span>主題</div>
        <div class="sel-wrap">
          <select id="selTheme" class="theme-sel" onchange="onSelectChange()">
            <option value="">── 選擇主題 ──</option>
            <option value="橘貓">🐱 橘貓</option>
            <option value="咖啡杯">☕ 咖啡杯</option>
            <option value="舊書店">📚 舊書店</option>

<script>
/* ══════════════════════════════════════════════════
   ①  OPTION DEFINITIONS
══════════════════════════════════════════════════ */
const OPTS = {
  theme: {
    '橘貓':  { label:'橘貓',    emoji:'🐱' },
    '咖啡杯':{ label:'咖啡杯',  emoji:'☕' },
    '舊書店':{ label:'舊書店',  emoji:'📚' },
    '公車站':{ label:'公車站',  emoji:'🚌' }
  },
  style: {
    '印象派':   { label:'印象派',   emoji:'🎨' },
    '水彩':     { label:'水彩',     emoji:'💧' },
    '極簡':     { label:'極簡',     emoji:'✏️' },
    '賽博龐克': { label:'賽博龐克', emoji:'🌃' }
  },
  element: {
    '肥皂泡':{ label:'肥皂泡', emoji:'🫧' },
    '雨滴':  { label:'雨滴',   emoji:'🌧️' },
    '綠意':  { label:'綠意',   emoji:'🌿' },
    '舊照片':{ label:'舊照片', emoji:'📷' }
  },
  bg: {
    '金光':{ label:'金光', emoji:'🌅' },
    '冷光':{ label:'冷光', emoji:'❄️' },
    '暖燈':{ label:'暖燈', emoji:'🕯️' },
    '霓虹':{ label:'霓虹', emoji:'🌃' }
  }
};

/* ══════════════════════════════════════════════════
   ②  IMAGE METADATA（從 Assets/all_meta.json 載入）
══════════════════════════════════════════════════ */
let IMAGE_MAP = {};  // key: "風格/主題/光線/元素" → {batch, fname, story, kw}

async function loadMetadata() {
  try {
    const resp = await fetch('Assets/all_meta.json');
    const data = await resp.json();
    data.forEach(row => {
      // 修正一筆資料錯誤：「向冷光」→「冷光」
      const kw = (row.kw || '').replace('向冷光', '冷光');
      const parts = kw.split(' / ');
      if (parts.length === 4) {
        IMAGE_MAP[parts.join('/')] = {
          batch: row.batch,
          fname: row.fname,
          story: row.story,
          kw:    kw
        };
      }
    });
    console.log('[CH3] 載入圖片資料', Object.keys(IMAGE_MAP).length, '筆');
  } catch(e) {
    console.warn('[CH3] 無法載入 all_meta.json:', e);
  }
}

// t=主題, s=風格, e=元素, b=光線
function lookupImage(t, s, e, b) {
  return IMAGE_MAP[`${s}/${t}/${b}/${e}`] || null;
}

function getImageSrc(entry) {
  return `Assets/${entry.batch}/images/${entry.fname}.png`;
}

function buildPrompt(t, s, e, b) {
  const entry = lookupImage(t, s, e, b);
  return entry ? entry.kw : `${s} / ${t} / ${b} / ${e}`;
}

/* ══════════════════════════════════════════════════
   ③  （Canvas 繪圖已移除，改用實際圖片）
══════════════════════════════════════════════════ */




/* ══════════════════════════════════════════════════
   ④  MySQL DB STUB
   ─────────────────────────────────────────────────
   建表 SQL：
   CREATE TABLE ch3_prompt_builder_log (
     id             INT AUTO_INCREMENT PRIMARY KEY,
     session_id     VARCHAR(36)   NOT NULL COMMENT '每次遊玩唯一識別',
     played_at      DATETIME      NOT NULL COMMENT '生成時間',
     use_count      TINYINT       COMMENT '第幾次生成 1/2/3',
     theme          VARCHAR(20)   COMMENT '主題選項',
     style          VARCHAR(20)   COMMENT '風格選項',
     element        VARCHAR(20)   COMMENT '元素選項',
     background     VARCHAR(20)   COMMENT '背景選項',
     prompt_text    TEXT          COMMENT '生成的提示詞全文',
     end_action     VARCHAR(10)   COMMENT 'retry / exit / null',
     total_time_sec SMALLINT      COMMENT '整場遊玩總秒數',
     created_at     TIMESTAMP     DEFAULT CURRENT_TIMESTAMP
   ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4
     COMMENT='第三章畫圖提示詞建構器遊戲紀錄';
   ─────────────────────────────────────────────────
══════════════════════════════════════════════════ */
const DB_CONFIG = {
  enabled:  false,
  endpoint: '/api/ch3-prompt-builder/log'
};
async function dbLog(row) {
  console.table(row);
  if (!DB_CONFIG.enabled) return;
  try {
    const res = await fetch(DB_CONFIG.endpoint, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify(row)
    });
    if (!res.ok) console.warn('[DB] failed:', res.status);
  } catch(e){ console.warn('[DB]', e); }
}

/* ══════════════════════════════════════════════════
   ⑤  GAME STATE
══════════════════════════════════════════════════ */
let G = {};
function resetState() {
  G = {
    sessionId:  crypto.randomUUID?.() || Date.now().toString(36),
    useCount:   0,
    gameStart:  Date.now(),
    slotImages: []   // 儲存各圖片 src 供結束畫面縮圖使用
  };
}

/* ══════════════════════════════════════════════════
   ⑥  INIT
══════════════════════════════════════════════════ */
function initGame() {
  resetState();
  buildSparkles();
  updateUseDots();

  // Reset selects
  ['selTheme','selStyle','selElement','selBg'].forEach(id=>{
    document.getElementById(id).value='';
    document.getElementById(id).classList.remove('chosen');
  });

  // Reset slots
  [0,1,2].forEach(i=>{
    const slot=document.getElementById('slot'+i);
    // Remove canvas wrap if exists
    const cw=slot.querySelector('.slot-canvas-wrap');
    if(cw) cw.remove();
    // Show empty placeholder
    const empty=slot.querySelector('.slot-empty');
    if(empty) empty.style.display='flex';
    slot.classList.remove('filled');
    const info=document.getElementById('info'+i);
    info.innerHTML=''; info.classList.remove('show');
  });

  G.slotImages=[];
  onSelectChange();
}

/* Sparkles */
function buildSparkles() {
  const wrap=document.getElementById('sparkles');
  wrap.innerHTML='';
  const emojis=['✨','⭐','🌟','💫','🎨','🖌️','🌈'];
  for(let i=0;i<12;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.textContent=emojis[i%emojis.length];
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*80+10}%;
      --sf-t:${3+Math.random()*3}s;--sf-d:${Math.random()*4}s;`;
    wrap.appendChild(s);
  }
}

function updateUseDots() {
  for(let i=0;i<3;i++){
    document.getElementById('dot'+i).classList.toggle('used', i < G.useCount);
  }
}

/* ══════════════════════════════════════════════════
   ⑦  SELECT CHANGE → UPDATE PROMPT DISPLAY
══════════════════════════════════════════════════ */
function onSelectChange() {
  const t=document.getElementById('selTheme').value;
  const s=document.getElementById('selStyle').value;
  const e=document.getElementById('selElement').value;
  const b=document.getElementById('selBg').value;

  // Update select visual state
  ['selTheme','selStyle','selElement','selBg'].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.toggle('chosen', el.value!=='');
  });

  const allChosen = t && s && e && b;
  const btn=document.getElementById('generateBtn');
  btn.classList.toggle('ready', allChosen && G.useCount<3);

  const promptEl=document.getElementById('promptText');
  if (!allChosen) {
    const missing=[];
    if(!s) missing.push('風格');
    if(!t) missing.push('主題');
    if(!b) missing.push('光線');
    if(!e) missing.push('元素');
    promptEl.innerHTML=`<span class="placeholder">還需要選擇：${missing.join('、')}…</span>`;
    return;
  }

  const entry = lookupImage(t, s, e, b);
  const so=OPTS.style[s], to=OPTS.theme[t], bo=OPTS.bg[b], eo=OPTS.element[e];

  promptEl.innerHTML =
    `<span class="tag tag-style">${so.emoji} ${so.label}</span> ` +
    `<span class="tag tag-theme">${to.emoji} ${to.label}</span> ` +
    `<span class="tag tag-bg">${bo.emoji} ${bo.label}</span> ` +
    `<span class="tag tag-element">${eo.emoji} ${eo.label}</span>` +
    (entry ? `<div style="margin-top:8px;font-size:.85rem;color:#4a5f7a;line-height:1.6;">${entry.story}</div>` : '');
}

/* ══════════════════════════════════════════════════
   ⑧  GENERATE IMAGE
══════════════════════════════════════════════════ */
function generateImage() {
  if (G.useCount >= 3) return;

  const t=document.getElementById('selTheme').value;
  const s=document.getElementById('selStyle').value;
  const e=document.getElementById('selElement').value;
  const b=document.getElementById('selBg').value;
  if (!t||!s||!e||!b) return;

  const slotIdx=G.useCount;
  const slot=document.getElementById('slot'+slotIdx);

  // Show generating overlay
  const overlay=document.createElement('div');
  overlay.className='gen-overlay';
  overlay.innerHTML='<div class="gen-spinner"></div><div class="gen-text">AI 正在繪圖中…✨</div>';
  slot.appendChild(overlay);

  setTimeout(()=>{
    overlay.remove();
    renderSlot(slot, slotIdx, t, s, e, b);
  }, 1200);

  G.useCount++;
  updateUseDots();

  // Update button text after first generation
  const btn=document.getElementById('generateBtn');
  if (G.useCount === 1) {
    btn.innerHTML='🔄 再次生成圖片';
  }

  // DB log
  dbLog({
    session_id:  G.sessionId,
    played_at:   new Date().toISOString(),
    use_count:   G.useCount,
    theme:       t, style:s, element:e, background:b,
    prompt_text: buildPrompt(t,s,e,b),
    end_action:  null, total_time_sec:null
  });

  // Disable button if max reached (after brief delay)
  setTimeout(()=>{
    if (G.useCount>=3) {
      const btn=document.getElementById('generateBtn');
      btn.classList.remove('ready');
      btn.textContent='已達 3 次上限';
      showEndOverlay();
    }
  }, 1800);
}

function renderSlot(slot, slotIdx, t, s, e, b) {
  const empty=slot.querySelector('.slot-empty');
  if(empty) empty.style.display='none';

  const entry = lookupImage(t, s, e, b);

  const wrap=document.createElement('div');
  wrap.className='slot-canvas-wrap';

  if (entry) {
    const img=document.createElement('img');
    img.src = getImageSrc(entry);
    img.alt = entry.kw;
    img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;';
    wrap.appendChild(img);
    G.slotImages[slotIdx] = img.src;
  } else {
    wrap.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:3rem;">🖼️</div>';
  }

  slot.insertBefore(wrap, document.getElementById('info'+slotIdx));
  slot.classList.add('filled','slot-appear');

  const so=OPTS.style[s], to=OPTS.theme[t], bo=OPTS.bg[b], eo=OPTS.element[e];
  const info=document.getElementById('info'+slotIdx);
  const storyText = entry ? entry.story : '';
  info.innerHTML=`
    <div class="slot-info-tags">
      <span class="slot-info-tag sit-style">${so.emoji} ${so.label}</span>
      <span class="slot-info-tag sit-theme">${to.emoji} ${to.label}</span>
      <span class="slot-info-tag sit-bg">${bo.emoji} ${bo.label}</span>
      <span class="slot-info-tag sit-element">${eo.emoji} ${eo.label}</span>
    </div>
    <div class="slot-info-prompt">${storyText.slice(0,60)}…</div>`;
  info.classList.add('show');

  if(slotIdx===0) spawnConfetti();
}

/* ══════════════════════════════════════════════════
   ⑨  END OVERLAY
══════════════════════════════════════════════════ */
function showEndOverlay() {
  setTimeout(()=>{
    // Build end gallery thumbs
    const gallEl=document.getElementById('endGallery');
    gallEl.innerHTML='';
    G.slotImages.forEach(src=>{
      if(!src) return;
      const thumb=document.createElement('div');
      thumb.className='end-thumb';
      const img=document.createElement('img');
      img.src=src;
      img.style.cssText='width:70px;height:70px;object-fit:cover;border-radius:8px;';
      thumb.appendChild(img);
      gallEl.appendChild(thumb);
    });
    document.getElementById('endOverlay').classList.add('show');
    spawnConfetti();
  }, 2500);
}

document.getElementById('btnRetry').addEventListener('click',()=>{
  dbLog({session_id:G.sessionId,played_at:new Date().toISOString(),
    use_count:3,theme:null,style:null,element:null,background:null,
    prompt_text:null,end_action:'retry',
    total_time_sec:Math.round((Date.now()-G.gameStart)/1000)});
  document.getElementById('endOverlay').classList.remove('show');
  document.getElementById('generateBtn').classList.add('ready');
  document.getElementById('generateBtn').innerHTML='✨ 生成圖片';
  initGame();
});

document.getElementById('btnExit').addEventListener('click',()=>{
  dbLog({session_id:G.sessionId,played_at:new Date().toISOString(),
    use_count:3,theme:null,style:null,element:null,background:null,
    prompt_text:null,end_action:'exit',
    total_time_sec:Math.round((Date.now()-G.gameStart)/1000)});
  window.close();
  // Fallback if window.close doesn't work
  document.getElementById('endOverlay').classList.remove('show');
  document.getElementById('app').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:70vh;gap:18px;text-align:center;animation:scaleIn .6s both;">
      <div style="font-size:5rem">🎨</div>
      <h2 style="font-family:Nunito,sans-serif;font-size:2rem;font-weight:900;
        background:linear-gradient(120deg,#ff5722,#e91e8c);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
        掰掰！繼續創作！</h2>
      <p style="color:#4a5f7a;max-width:300px;line-height:1.7;font-size:.9rem;">
        你的提示詞組合創造了獨特的圖片，<br>這就是和 AI 一起創作的魔法！🌟</p>
    </div>`;
});

/* ══════════════════════════════════════════════════
   ⑩  CONFETTI
══════════════════════════════════════════════════ */
function spawnConfetti() {
  const wrap=document.getElementById('confettiWrap');
  const cols=['#ff5722','#e91e8c','#7c3aed','#00b8d4','#ffc107','#00c853'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='conf';
    const sz=6+Math.random()*10;
    c.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz*(.4+Math.random()*.6)}px;
      background:${cols[i%cols.length]};transform:rotate(${Math.random()*360}deg);
      --cf-t:${1.3+Math.random()*.9}s;--cf-d:${Math.random()*.6}s;
      --cf-drift:${(Math.random()-.5)*180}px;`;
    wrap.appendChild(c);
  }
  setTimeout(()=>wrap.innerHTML='', 2800);
}

/* ══════════════════════════════════════════════════
   BOOT  — 先載入圖片資料，再初始化遊戲
══════════════════════════════════════════════════ */
loadMetadata().then(() => initGame());

/* ── Google Sites iframe 高度通報（自動適配）──
   Google Sites 嵌入時建議手動將 iframe 高度設為 800px 或更高
   此程式碼同時通報父層視窗實際高度供參考
   新增額外補償高度以確保所有內容可見                  */
(function(){
  function reportHeight(){
    const scrollHeight = document.documentElement.scrollHeight;
    const compensatedHeight = scrollHeight + 20; // 額外補償 20px 緩衝
    try { window.parent.postMessage({ type:'iframeHeight', height: compensatedHeight }, '*'); } catch(e){}
  }
  reportHeight();
  window.addEventListener('resize', reportHeight);
  // 延遲再報告一次，確保圖片等資源加載完成
  setTimeout(reportHeight, 1500);
})();
</script>
