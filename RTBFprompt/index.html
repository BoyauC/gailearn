<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RTBF 提示詞拼圖挑戰</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Noto Sans TC',sans-serif;
  background:#F5F3EE;
}
.screen{display:none;width:100%;height:100%;}
.screen.active{display:flex;}

/* ── HOME ── */
#home-screen{
  flex-direction:column;align-items:center;justify-content:center;gap:28px;
}
.home-title{font-size:30px;font-weight:700;color:#222;}
.home-sub{font-size:15px;color:#666;}
.rtbf-preview{display:flex;gap:10px;}
.chip{padding:8px 18px;border-radius:8px;font-size:17px;font-weight:700;border-width:2px;border-style:solid;}
.chip-R{background:#DBEAFE;border-color:#93C5FD;color:#1E40AF;}
.chip-T{background:#DCFCE7;border-color:#86EFAC;color:#166534;}
.chip-B{background:#FEF3C7;border-color:#FCD34D;color:#92400E;}
.chip-F{background:#EDE9FE;border-color:#C4B5FD;color:#5B21B6;}

/* ── INTRO ── */
#intro-screen{
  flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px;
}
.intro-tag{
  font-size:13px;font-weight:700;padding:4px 16px;border-radius:20px;
  background:#E5E7EB;color:#374151;
}
.intro-bad{
  font-size:17px;color:#991B1B;background:#FEE2E2;
  border:1px solid #F87171;border-radius:8px;padding:12px 22px;
}
.intro-goal{
  font-size:16px;color:#166534;background:#DCFCE7;
  border:1px solid #86EFAC;border-radius:8px;padding:12px 22px;
  text-align:center;max-width:560px;line-height:1.7;
}
.intro-hint{font-size:14px;color:#555;max-width:560px;text-align:center;line-height:1.7;}

/* ── GAME ── */
#game-screen{flex-direction:column;background:#ECEAE4;}
.game-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 18px;background:#F5F3EE;border-bottom:1px solid #D4D0C8;
  flex-shrink:0;
}
.game-level-name{font-size:17px;font-weight:700;color:#333;}

/* Play area – single coordinate space for blocks + box */
#play-area{
  flex:1;position:relative;overflow:hidden;
}

/* Box container inside play area */
#box-container{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.box-label-txt{font-size:12px;color:#888;white-space:nowrap;}
#box-grid{
  position:relative;
  background:#D4D0C8;border:2px solid #B8B4AC;border-radius:6px;padding:3px;
}
.box-cell{
  position:absolute;width:54px;height:54px;
  background:#EAE7DF;border:1.5px dashed #C4C0B8;border-radius:3px;
}

/* ── BLOCKS ── */
.block{
  position:absolute;cursor:grab;touch-action:none;user-select:none;
  z-index:10;
}
.block.dragging{cursor:grabbing;z-index:200;}
.block-inner{position:relative;}
.block-cell-div{
  position:absolute;width:54px;height:54px;
  border-radius:4px;border-width:2px;border-style:solid;
}
.block-R .block-cell-div{background:#DBEAFE;border-color:#93C5FD;}
.block-T .block-cell-div{background:#DCFCE7;border-color:#86EFAC;}
.block-B .block-cell-div{background:#FEF3C7;border-color:#FCD34D;}
.block-F .block-cell-div{background:#EDE9FE;border-color:#C4B5FD;}

.block.error .block-cell-div{
  background:#FEE2E2!important;border-color:#F87171!important;
  animation:errshake .45s ease;
}
@keyframes errshake{
  0%,100%{transform:translate(0,0);}
  20%{transform:translate(-5px,0);}
  40%{transform:translate(5px,0);}
  60%{transform:translate(-4px,0);}
  80%{transform:translate(4px,0);}
}

.block-letter-overlay{
  position:absolute;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;pointer-events:none;
}
.block-R .block-letter-overlay{color:#1E40AF;}
.block-T .block-letter-overlay{color:#166534;}
.block-B .block-letter-overlay{color:#92400E;}
.block-F .block-letter-overlay{color:#5B21B6;}

.block-tag{
  position:absolute;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.93);border:1px solid #ddd;border-radius:6px;
  padding:4px 8px;font-size:11px;line-height:1.5;text-align:center;
  white-space:normal;word-break:break-all;pointer-events:none;
  min-width:130px;max-width:210px;
}
.block-R .block-tag{color:#1E40AF;}
.block-T .block-tag{color:#166534;}
.block-B .block-tag{color:#92400E;}
.block-F .block-tag{color:#5B21B6;}

/* ── BUTTONS ── */
.btn{
  padding:12px 36px;font-size:17px;font-weight:700;border:none;border-radius:10px;
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;
}
.btn-primary{background:#3B82F6;color:#fff;}
.btn-primary:active{background:#2563EB;}
.btn-hint{
  padding:7px 18px;background:#FEF3C7;border:2px solid #FCD34D;
  color:#92400E;font-size:14px;font-weight:700;border-radius:8px;
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;
}

/* ── HINT OVERLAY ── */
#hint-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  align-items:center;justify-content:center;z-index:1500;
}
#hint-overlay.active{display:flex;}
.hint-card{
  background:#fff;border-radius:14px;padding:26px 32px;max-width:440px;width:90%;
}
.hint-title{font-size:18px;font-weight:700;margin-bottom:12px;}
.hint-body{font-size:15px;color:#444;line-height:1.9;}

/* ── SUCCESS OVERLAY ── */
#success-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  align-items:center;justify-content:center;z-index:2000;
}
#success-overlay.active{display:flex;}
.success-card{
  background:#fff;border-radius:16px;padding:30px 38px;
  max-width:580px;width:92%;max-height:88vh;overflow-y:auto;
}
.success-title{font-size:22px;font-weight:700;color:#166534;margin-bottom:14px;}
.s-bad{
  font-size:13px;color:#991B1B;background:#FEE2E2;
  border-radius:8px;padding:8px 14px;margin-bottom:14px;
}
.prompt-lines{display:flex;flex-direction:column;gap:8px;margin-bottom:22px;}
.pline{
  opacity:0;transform:translateY(10px);
  transition:opacity .4s,transform .4s;
  padding:8px 14px;border-radius:8px;font-size:14px;line-height:1.6;
}
.pline.vis{opacity:1;transform:translateY(0);}
.pline-R{background:#DBEAFE;color:#1E40AF;}
.pline-T{background:#DCFCE7;color:#166534;}
.pline-B{background:#FEF3C7;color:#92400E;}
.pline-F{background:#EDE9FE;color:#5B21B6;}

/* ── ERROR TOAST ── */
#err-toast{
  display:none;position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:#FEE2E2;border:2px solid #F87171;color:#991B1B;
  padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;z-index:1800;
  white-space:nowrap;
}

/* ── FINAL ── */
#final-screen{
  flex-direction:column;align-items:center;justify-content:center;
  gap:22px;padding:30px;
}
.final-title{font-size:26px;font-weight:700;color:#222;}
.rtbf-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.rcard{
  border-radius:10px;padding:14px 18px;min-width:150px;max-width:190px;
  border-width:2px;border-style:solid;
}
.rcard-R{background:#DBEAFE;border-color:#93C5FD;color:#1E40AF;}
.rcard-T{background:#DCFCE7;border-color:#86EFAC;color:#166534;}
.rcard-B{background:#FEF3C7;border-color:#FCD34D;color:#92400E;}
.rcard-F{background:#EDE9FE;border-color:#C4B5FD;color:#5B21B6;}
.rcard-key{font-size:20px;font-weight:700;}
.rcard-name{font-size:13px;font-weight:700;margin-bottom:4px;}
.rcard-desc{font-size:11px;line-height:1.6;}
</style>
</head>
<body>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <div class="home-title">RTBF 提示詞拼圖挑戰</div>
  <div class="home-sub">學會組合精準 AI 提示詞的四個關鍵元素</div>
  <div class="rtbf-preview">
    <div class="chip chip-R">R 角色</div>
    <div class="chip chip-T">T 任務</div>
    <div class="chip chip-B">B 背景</div>
    <div class="chip chip-F">F 格式</div>
  </div>
  <button class="btn btn-primary" onclick="startGame()">開始挑戰</button>
</div>

<!-- INTRO -->
<div id="intro-screen" class="screen">
  <div class="intro-tag" id="intro-tag"></div>
  <div class="intro-bad" id="intro-bad"></div>
  <div class="intro-goal" id="intro-goal"></div>
  <div class="intro-hint" id="intro-hint-txt"></div>
  <button class="btn btn-primary" onclick="enterGame()">我準備好了 →</button>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="game-level-name" id="game-level-name"></div>
    <button class="btn-hint" onclick="showHint()">💡 提示</button>
  </div>
  <div id="play-area">
    <div id="box-container">
      <div class="box-label-txt">將四個方塊拼入箱子，填滿所有格子</div>
      <div id="box-grid"></div>
    </div>
  </div>
</div>

<!-- HINT OVERLAY -->
<div id="hint-overlay" onclick="hideHint()">
  <div class="hint-card" onclick="event.stopPropagation()">
    <div class="hint-title">💡 本關提示</div>
    <div class="hint-body" id="hint-body"></div>
    <br>
    <button class="btn btn-primary" style="width:100%" onclick="hideHint()">知道了</button>
  </div>
</div>

<!-- SUCCESS OVERLAY -->
<div id="success-overlay">
  <div class="success-card">
    <div class="success-title">🎉 答對了！精準提示詞解鎖！</div>
    <div class="s-bad" id="s-bad"></div>
    <div class="prompt-lines" id="prompt-lines"></div>
    <button class="btn btn-primary" style="width:100%" id="next-btn" onclick="nextLevel()"></button>
  </div>
</div>

<!-- ERROR TOAST -->
<div id="err-toast"></div>

<!-- FINAL -->
<div id="final-screen" class="screen">
  <div class="final-title">🏆 恭喜完成四關！</div>
  <div style="font-size:15px;color:#555;">你已掌握 RTBF 精準提示詞的四個關鍵元素</div>
  <div class="rtbf-cards">
    <div class="rcard rcard-R">
      <div class="rcard-key">R</div>
      <div class="rcard-name">Role 角色</div>
      <div class="rcard-desc">AI 扮演誰<br>我希望 AI 像誰一樣回答我？</div>
    </div>
    <div class="rcard rcard-T">
      <div class="rcard-key">T</div>
      <div class="rcard-name">Task 任務</div>
      <div class="rcard-desc">AI 要做什麼<br>我要 AI 幫我「做什麼」？</div>
    </div>
    <div class="rcard rcard-B">
      <div class="rcard-key">B</div>
      <div class="rcard-name">Background 背景</div>
      <div class="rcard-desc">你的情況<br>AI 需要知道我哪些「狀況與需求」？</div>
    </div>
    <div class="rcard rcard-F">
      <div class="rcard-key">F</div>
      <div class="rcard-name">Format 格式</div>
      <div class="rcard-desc">怎麼呈現<br>我希望答案「長什麼樣子」？</div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="restartGame()">再玩一次</button>
</div>

      ],

/* ─────────────────────────────────────────────
   State
───────────────────────────────────────────── */
let currentLevel = 0;
let blocks = {};     // key -> { el, rotation, placed, gx, gy, ox, oy }
let grid = [];       // ROWS x COLS, null or key

/* ─────────────────────────────────────────────
   Screen helpers
───────────────────────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function startGame()   { currentLevel = 0; showIntro(); }
function restartGame() { currentLevel = 0; showIntro(); }
function nextLevel() {
  document.getElementById('success-overlay').classList.remove('active');
  if (currentLevel < LEVELS.length - 1) { currentLevel++; showIntro(); }
  else { showScreen('final-screen'); }
}

/* ─────────────────────────────────────────────
   Intro
───────────────────────────────────────────── */
function showIntro() {
  const lv = LEVELS[currentLevel];
  document.getElementById('intro-tag').textContent     = lv.tag;
  document.getElementById('intro-bad').textContent     = lv.bad;
  document.getElementById('intro-goal').textContent    = lv.goal;
  document.getElementById('intro-hint-txt').textContent = lv.introHint;
  showScreen('intro-screen');
}

/* ─────────────────────────────────────────────
   Game setup
───────────────────────────────────────────── */
function enterGame() {
  setupGame();
  showScreen('game-screen');
  if (currentLevel === 0) { showHint(); setTimeout(hideHint, 5000); }
}

function setupGame() {
  const lv = LEVELS[currentLevel];
  document.getElementById('game-level-name').textContent = lv.name;

  // Reset grid state
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));

  // Build box grid DOM
  const boxGrid = document.getElementById('box-grid');
  boxGrid.innerHTML = '';
  const gw = COLS * CELL + (COLS - 1) * GAP;
  const gh = ROWS * CELL + (ROWS - 1) * GAP;
  boxGrid.style.width  = (gw + 6) + 'px';
  boxGrid.style.height = (gh + 6) + 'px';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'box-cell';
      cell.style.left = (3 + c * STEP) + 'px';
      cell.style.top  = (3 + r * STEP) + 'px';
      boxGrid.appendChild(cell);
    }
  }

  // Clear play area blocks
  const playArea = document.getElementById('play-area');
  playArea.querySelectorAll('.block').forEach(b => b.remove());
  blocks = {};

  // Scatter positions (landscape, relative to play-area top-left)
  // Will be set after layout; we defer via rAF
  requestAnimationFrame(() => {
    const pa = playArea.getBoundingClientRect();
    const bc = document.getElementById('box-container').getBoundingClientRect();
    const scatterBottom = bc.top - pa.top - 10; // usable height above box
    const scatterWidth  = pa.width;

    // Predefined scatter grid: 4 spots arranged in 2 columns × 2 rows
    const spots = [
      { x: scatterWidth * 0.05, y: 10 },
      { x: scatterWidth * 0.35, y: 30 },
      { x: scatterWidth * 0.62, y: 10 },
      { x: scatterWidth * 0.78, y: scatterBottom * 0.35 }
    ];

    ['R', 'T', 'B', 'F'].forEach((key, i) => {
      const pos = spots[i];
      const el = buildBlockEl(key, 0, lv.options[key]);
      el.style.left = pos.x + 'px';
      el.style.top  = pos.y + 'px';
      playArea.appendChild(el);
      blocks[key] = { el, rotation: 0, placed: false, gx: -1, gy: -1, ox: pos.x, oy: pos.y };
      attachDragEvents(el, key);
    });
  });
}

/* ─────────────────────────────────────────────
   Block rendering
───────────────────────────────────────────── */
function shapeBounds(shape) {
  let mr = 0, mc = 0;
  shape.forEach(([r, c]) => { mr = Math.max(mr, r); mc = Math.max(mc, c); });
  return { rows: mr + 1, cols: mc + 1 };
}

function buildBlockEl(key, rotation, options) {
  const el = document.createElement('div');
  el.className = `block block-${key}`;
  renderBlockInner(el, key, rotation, options);
  return el;
}

function renderBlockInner(el, key, rotation, options) {
  const allShapes = SHAPES[key];
  const rot = ((rotation % allShapes.length) + allShapes.length) % allShapes.length;
  const shape = allShapes[rot];
  const { rows, cols } = shapeBounds(shape);
  const w = cols * STEP - GAP;
  const h = rows * STEP - GAP;

  el.innerHTML = '';

  // Cell container
  const inner = document.createElement('div');
  inner.className = 'block-inner';
  inner.style.width  = w + 'px';
  inner.style.height = h + 'px';

  shape.forEach(([r, c]) => {
    const d = document.createElement('div');
    d.className = 'block-cell-div';
    d.style.left = (c * STEP) + 'px';
    d.style.top  = (r * STEP) + 'px';
    inner.appendChild(d);
  });

  // Letter overlay
  const letter = document.createElement('div');
  letter.className = 'block-letter-overlay';
  letter.style.cssText = `left:0;top:0;width:${w}px;height:${h}px;`;
  letter.textContent = key;
  inner.appendChild(letter);

  el.appendChild(inner);

  // Text tag below
  const optIdx = rot % options.length;
  const tag = document.createElement('div');
  tag.className = 'block-tag';
  tag.style.top = (h + 5) + 'px';
  tag.innerHTML = `<strong>${key}｜</strong>${options[optIdx]}`;
  el.appendChild(tag);

  el.style.width = w + 'px';
}

/* ─────────────────────────────────────────────
   Drag & drop (Pointer Events)
───────────────────────────────────────────── */
function attachDragEvents(el, key) {
  let active = false, moved = false;
  let startPx, startPy;   // pointer start
  let startEx, startEy;   // element start position
  let tapStart;

  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    active = true; moved = false;
    tapStart = Date.now();
    startPx = e.clientX; startPy = e.clientY;
    startEx = parseFloat(el.style.left) || 0;
    startEy = parseFloat(el.style.top)  || 0;

    el.classList.add('dragging');
    el.style.zIndex = 100;

    // Lift from grid if placed
    if (blocks[key].placed) liftFromGrid(key);
  });

  el.addEventListener('pointermove', e => {
    if (!active) return;
    e.preventDefault();
    const dx = e.clientX - startPx, dy = e.clientY - startPy;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
    el.style.left = (startEx + dx) + 'px';
    el.style.top  = (startEy + dy) + 'px';
  });

  el.addEventListener('pointerup', e => {
    if (!active) return;
    active = false;
    el.classList.remove('dragging');
    el.style.zIndex = 10;

    const block = blocks[key];

    if (!moved && Date.now() - tapStart < 400) {
      // Tap → rotate
      block.rotation++;
      const lv = LEVELS[currentLevel];
      renderBlockInner(el, key, block.rotation, lv.options[key]);
      el.style.left = startEx + 'px';
      el.style.top  = startEy + 'px';
      return;
    }

    // Try snap to box grid
    const playArea = document.getElementById('play-area');
    const boxGrid  = document.getElementById('box-grid');
    const paRect   = playArea.getBoundingClientRect();
    const bgRect   = boxGrid.getBoundingClientRect();

    const boxOriginX = bgRect.left - paRect.left + 3; // +3 box padding
    const boxOriginY = bgRect.top  - paRect.top  + 3;

    const elX = parseFloat(el.style.left);
    const elY = parseFloat(el.style.top);
    const relX = elX - boxOriginX;
    const relY = elY - boxOriginY;

    const snapCol = Math.round(relX / STEP);
    const snapRow = Math.round(relY / STEP);

    const allShapes = SHAPES[key];
    const rot = ((block.rotation % allShapes.length) + allShapes.length) % allShapes.length;
    const shape = allShapes[rot];

    if (tryPlace(key, shape, snapRow, snapCol)) {
      // Snap
      el.style.left = (boxOriginX + snapCol * STEP) + 'px';
      el.style.top  = (boxOriginY + snapRow * STEP) + 'px';
      block.placed = true;
      block.gx = snapCol;
      block.gy = snapRow;
      checkWin();
    } else {
      // Return home
      el.style.left = block.ox + 'px';
      el.style.top  = block.oy + 'px';
    }
  });
}

function tryPlace(key, shape, row, col) {
  for (const [r, c] of shape) {
    const nr = row + r, nc = col + c;
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return false;
    if (grid[nr][nc] !== null && grid[nr][nc] !== key)  return false;
  }
  for (const [r, c] of shape) grid[row + r][col + c] = key;
  return true;
}

function liftFromGrid(key) {
  blocks[key].placed = false;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] === key) grid[r][c] = null;
  blocks[key].gx = -1;
  blocks[key].gy = -1;
}

/* ─────────────────────────────────────────────
   Win check
───────────────────────────────────────────── */
function checkWin() {
  const keys = ['R', 'T', 'B', 'F'];

  // All placed?
  if (!keys.every(k => blocks[k].placed)) return;

  // All 15 cells filled?
  let filled = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] !== null) filled++;
  if (filled !== 15) {
    showToast('方塊沒有完全填滿箱子！請重新拖移。');
    return;
  }

  // Correct rotation? (correctIndex = 0 for every block)
  const lv = LEVELS[currentLevel];
  const wrong = keys.filter(k => {
    const b = blocks[k];
    const numOpts = lv.options[k].length;
    const optIdx = ((b.rotation % numOpts) + numOpts) % numOpts;
    return optIdx !== 0;
  });

  if (wrong.length > 0) {
    wrong.forEach(k => {
      const el = blocks[k].el;
      el.classList.remove('error');
      void el.offsetWidth; // reflow to restart animation
      el.classList.add('error');
      setTimeout(() => el.classList.remove('error'), 800);
    });
    showToast(`方塊 ${wrong.join('、')} 的選項不正確！點擊旋轉到正確面。`);
    return;
  }

  // 🎉 WIN
  showSuccess();
}

/* ─────────────────────────────────────────────
   Success overlay
───────────────────────────────────────────── */
function showSuccess() {
  const lv = LEVELS[currentLevel];
  document.getElementById('s-bad').textContent = lv.bad;

  const container = document.getElementById('prompt-lines');
  container.innerHTML = '';
  lv.promptLines.forEach(line => {
    const d = document.createElement('div');
    d.className = `pline pline-${line.key}`;
    d.innerHTML = `<strong>${line.key}｜</strong>${line.text}`;
    container.appendChild(d);
  });

  document.getElementById('next-btn').textContent =
    currentLevel < LEVELS.length - 1 ? '下一關 →' : '查看學習總結 →';

  document.getElementById('success-overlay').classList.add('active');

  // Staggered fade-in
  container.querySelectorAll('.pline').forEach((d, i) => {
    setTimeout(() => d.classList.add('vis'), 300 + i * 500);
  });
}

/* ─────────────────────────────────────────────
   Hint
───────────────────────────────────────────── */
function showHint() {
  const lv = LEVELS[currentLevel];
  document.getElementById('hint-body').style.whiteSpace = 'pre-line';
  document.getElementById('hint-body').textContent = lv.hint;
  document.getElementById('hint-overlay').classList.add('active');
}
function hideHint() {
  document.getElementById('hint-overlay').classList.remove('active');
}

/* ─────────────────────────────────────────────
   Toast
───────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('err-toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2800);
}
</script>
