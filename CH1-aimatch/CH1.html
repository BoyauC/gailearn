<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 應用配對遊戲</title>
    <style>
        /* ====== 基本設定與童趣風格 CSS ====== */
        :root {
            --primary: #FF9AA2;
            --secondary: #FFB7B2;
            --accent: #FFDAC1;
            --basket-per: #E2F0CB;
            --basket-rec: #B5EAD7;
            --basket-cre: #C7CEEA;
            --text-dark: #555555;
        }

        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", "Noto Sans TC", "PingFang TC", "蘋方", "Hiragino Sans GB", "Heiti TC", sans-serif;
            background-color: #fcfcfc;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            overscroll-behavior: none;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 { margin: 0; font-size: 24px; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        .stats { font-size: 20px; font-weight: bold; }

        #game-board {
            display: flex;
            max-width: 900px;
            margin: 30px auto;
            padding: 0 15px;
            gap: 20px;
        }

        #cards-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            min-height: 500px;
        }

        /* 卡片設計 */
        .card {
            width: 150px;
            height: 150px;
            background-color: white;
            border: 4px solid var(--accent);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: grab;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            touch-action: none;
            user-select: none;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: width 0.3s, height 0.3s, margin 0.3s;
        }
        
        .card.dragging {
            cursor: grabbing;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        /* 放入籃子後的卡片樣式 */
        .card.placed {
            width: 90px;
            height: 90px;
            cursor: default; /* 取消拖曳游標 */
            box-shadow: none;
            margin: 5px;
        }

        .card.placed .card-name {
            font-size: 12px;
            padding: 2px 5px;
        }

        .card-name {
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 10px;
            border-radius: 10px;
            font-weight: bold;
            pointer-events: none;
            text-align: center;
        }

        /* 對錯圖示 (預設隱藏) */
        .result-icon {
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 28px;
            background: white;
            border-radius: 50%;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 籃子區設計 */
        #baskets-area {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .basket {
            min-height: 120px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 10px;
            border: 4px dashed #ccc;
            transition: all 0.3s;
        }

        .basket-title {
            font-size: 22px;
            font-weight: bold;
            width: 150px;
            text-align: center;
            margin-right: 15px;
        }

        /* 用來裝放置後卡片的容器 */
        .basket-content {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 100px;
            border-left: 2px solid rgba(0,0,0,0.1);
            padding-left: 10px;
        }

        .basket[data-category="perception"] { background-color: var(--basket-per); border-color: #9FC17D; }
        .basket[data-category="recommendation"] { background-color: var(--basket-rec); border-color: #69C9A1; }
        .basket[data-category="creation"] { background-color: var(--basket-cre); border-color: #8C99D2; }

        /* 控制區與訊息 */
        #controls-area {
            text-align: center;
            margin-top: 10px;
            padding-bottom: 30px;
        }

        #feedback-msg {
            font-size: 24px;
            font-weight: bold;
            color: #D32F2F;
            margin-bottom: 15px;
            display: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #D67A81;
            transition: transform 0.1s;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        /* 結果彈窗 */
        #result-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-content h2 { color: var(--primary); font-size: 32px; }
        .notes-box {
            text-align: left; background: #f4f4f4; padding: 15px; border-radius: 10px; margin: 20px 0; line-height: 1.6;
        }

        /* 響應式：手機與平板轉直向時 */
        @media (max-width: 768px) {
            #game-board { flex-direction: column; }
            #cards-area { flex-direction: row; justify-content: space-around; flex-wrap: wrap; min-height: auto; }
            .basket { flex-direction: column; align-items: flex-start; }
            .basket-title { width: 100%; text-align: left; margin-bottom:
